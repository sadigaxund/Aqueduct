# blueprint.yml
# Reading from S3 or Minio with explicit schema hints.

aqueduct: "1.0"
id: s3_parquet_demo
name: "S3/Minio Parquet Ingress Snippet"


modules:
  - id: weather_data_s3
    label: "Weather Data S3 Ingress"
    type: Ingress
    config:
      format: parquet
      # Static path as requested.
      path: "s3a://aqueduct-gallery/weather-data/"
      
      schema_hints:
        station_id: string
        observation_date: date
        temperature: double
        humidity: double
        is_valid: boolean

  - id: output_save
    label: "Save Result"
    type: Egress
    config:
      format: parquet
      path: data/output/output.parquet
      mode: overwrite

edges:
  - from: weather_data_s3
    to: output_save
