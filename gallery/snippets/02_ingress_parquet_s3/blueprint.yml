# blueprint.yml
# Reading from S3 or Minio with explicit schema hints.

aqueduct: "1.0"
id: s3_parquet_demo
name: "S3/Minio Parquet Ingress Snippet"

spark_config:
  spark.jars.packages: "org.apache.hadoop:hadoop-aws:3.3.4"
  # Workaround for ISSUE-001: Set Hadoop properties globally via spark.hadoop prefix
  spark.hadoop.fs.s3a.endpoint: "${S3_ENDPOINT:-}"
  spark.hadoop.fs.s3a.access.key: "${S3_ACCESS_KEY:-}"
  spark.hadoop.fs.s3a.secret.key: "${S3_SECRET_KEY:-}"
  spark.hadoop.fs.s3a.path.style.access: "true"
  spark.hadoop.fs.s3a.impl: "org.apache.hadoop.fs.s3a.S3AFileSystem"
  spark.hadoop.fs.s3a.aws.credentials.provider: "org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider"

modules:
  - id: weather_data_s3
    label: "Weather Data S3 Ingress"
    type: Ingress
    config:
      format: parquet
      # Static path as requested.
      path: "s3a://aqueduct-gallery/weather-data/"
      
      schema_hints:
        station_id: string
        observation_date: date
        temperature: double
        humidity: double
        is_valid: boolean

  - id: output_save
    label: "Save Result"
    type: Egress
    config:
      format: parquet
      path: data/output/output.parquet
      mode: overwrite

edges:
  - from: weather_data_s3
    to: output_save
