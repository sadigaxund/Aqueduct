# chain_target.yml
# Chained by hooks_demo's on_success blueprint: hook.

aqueduct: "1.0"
id: hooks_chain_target
name: "Hook Chain Target"

modules:
  - id: data
    label: "Data"
    type: Ingress
    config:
      format: csv
      path: ../data/input/orders.csv
      options: {header: "true", inferSchema: "true"}

  - id: output
    label: "Output"
    type: Egress
    config:
      format: parquet
      path: data/output/chain_result.parquet
      mode: overwrite

edges:
  - from: data
    to: output
