aqueduct_config: "1.0"

# aqueduct.yml
deployment:
  engine: spark
  target: local
  master_url: "local[*]"

spark_config:
  # Hardcoded due to ISSUE-027: ENV vars not supported in spark_config block yet.
  # Use io.delta:delta-spark_4.1_2.13:4.2.0 for Spark 4.1.x
  spark.jars.packages: "io.delta:delta-spark_4.1_2.13:4.2.0"
  spark.sql.extensions: "io.delta.sql.DeltaSparkSessionExtension"
  spark.sql.catalog.spark_catalog: "org.apache.spark.sql.delta.catalog.DeltaCatalog"

stores:
  observability:
    backend: duckdb
    path: .aqueduct/observability.db
