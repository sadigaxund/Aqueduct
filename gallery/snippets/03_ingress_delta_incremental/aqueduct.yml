aqueduct_config: "1.0"

warnings:
  suppress:
    - "*"

# aqueduct.yml
deployment:
  engine: spark
  target: local
  master_url: "local[*]"

spark_config:
  # Delta ↔ Spark artifact matrix (matches populate_delta.py logic):
  #   Spark 4.0.x → delta-spark_4.0_2.13:4.2.0
  #   Spark 4.1.x → delta-spark_4.1_2.13:4.2.0
  # Override via env vars (e.g., DELTA_SPARK_VER=4.1) to match your PySpark.
  spark.jars.packages: "io.delta:delta-spark_${DELTA_SPARK_VER:-4.0}_2.13:${DELTA_VER:-4.2.0}"
  spark.sql.extensions: "io.delta.sql.DeltaSparkSessionExtension"
  spark.sql.catalog.spark_catalog: "org.apache.spark.sql.delta.catalog.DeltaCatalog"

stores:
  observability:
    backend: duckdb
    path: .aqueduct
