aqueduct_config: "1.0"

warnings:
  suppress:
    - "*"

deployment:
  engine: spark
  target: local
  master_url: "local[*]"

stores:
  observability:
    backend: duckdb
    path: .aqueduct

agent:
  provider: openai_compat
  model: gpt-4o-mini
  budget:
    max_reprompts: 3
  memory:
    replay: true
    coaching: true
