# blueprint.yml
# Reading from a relational database using JDBC.

aqueduct: "1.0"
id: postgres_ingress_demo
name: "PostgreSQL Ingress Snippet"


modules:
  - id: inventory_db
    label: "Inventory DB Ingress"
    type: Ingress
    config:
      format: jdbc
      
      options:
        url: "${JDBC_URL:-jdbc:sqlite:data/input/inventory.db}"
        user: "${JDBC_USER:-}"
        password: "${JDBC_PASSWORD:-}"
        driver: "${JDBC_DRIVER:-org.sqlite.JDBC}"
        # Spark JDBC uses 'dbtable'
        dbtable: "inventory"
        fetchsize: "1000"

  - id: output_save
    label: "Save Result"
    type: Egress
    config:
      format: parquet
      path: data/output/output.parquet
      mode: overwrite

edges:
  - from: inventory_db
    to: output_save
