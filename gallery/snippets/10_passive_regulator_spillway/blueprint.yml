# blueprint.yml
# Passive Regulator: Data validation and error routing (Spillway).

aqueduct: "1.0"
id: spillway_demo
name: "Spillway & Passive Regulator Snippet"

modules:
  - id: raw_scores
    label: "Raw Scores Ingress"
    type: Ingress
    config:
      format: csv
      path: data/input/scores.csv
      options: {header: "true", inferSchema: "true"}

  - id: validate_scores
    label: "Score Validator"
    type: Channel
    config:
      op: sql
      query: "SELECT * FROM raw_scores"
      # The spillway_condition handles the actual splitting logic.
      # try_cast (not cast) so a malformed value like 'invalid' becomes NULL
      # and routes to the spillway instead of aborting the stage under Spark
      # ANSI mode — `score < 0` on a STRING column does an implicit
      # STRING->BIGINT cast that throws on 'invalid'.
      spillway_condition: "try_cast(score AS DOUBLE) IS NULL OR try_cast(score AS DOUBLE) < 0 OR try_cast(score AS DOUBLE) > 100"
    checkpoint: true

  - id: good_output
    label: "Save Valid Records"
    type: Egress
    config:
      format: parquet
      path: data/output/valid_scores.parquet
      mode: overwrite

  - id: bad_output
    label: "Save Rejected Records"
    type: Egress
    config:
      format: csv
      path: data/output/rejected_scores.csv
      options: {header: "true"}
      mode: overwrite

edges:
  - from: raw_scores
    to: validate_scores
  - from: validate_scores
    to: good_output
  - from: validate_scores
    to: bad_output
    port: spillway
