aqueduct_config: "1.0"

warnings:
  suppress:
    - "*"

# aqueduct.yml
deployment:
  engine: spark
  target: local
  master_url: "local[*]"

stores:
  observability:
    backend: duckdb
    path: .aqueduct
  # The Depot store persists watermarks for incremental processing
  depots:
    default:
      backend: duckdb
      path: .aqueduct/depot.db
