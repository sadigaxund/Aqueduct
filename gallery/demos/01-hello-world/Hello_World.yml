aqueduct: "1.0"
id: hello.world
name: "Hello World Demo"
description: "A minimal Aqueduct pipeline demonstrating Ingress, Channel (SQL), and Egress."

context:
  paths:
    input: "data/users.csv"
    output: "output/processed_users.parquet"

modules:
  - id: raw_users
    type: Ingress
    label: "Load Users CSV"
    config:
      format: csv
      path: "${ctx.paths.input}"
      options:
        header: "true"
        inferSchema: "true"

  - id: filter_new_york
    type: Channel
    label: "Filter New York Users"
    config:
      op: sql
      query: |
        SELECT 
          user_id, 
          UPPER(name) AS name, 
          age, 
          city 
        FROM raw_users 
        WHERE city = 'New York'

  - id: save_users
    type: Egress
    label: "Save Processed Users"
    config:
      format: csv
      path: "${ctx.paths.output}"
      mode: overwrite

edges:
  - from: raw_users
    to: filter_new_york
  - from: filter_new_york
    to: save_users
