aqueduct_scenario: "1.0"
id: format_mismatch_parquet_as_csv
description: >
  Ingress reads a Parquet file as 'parquet' format (correct), but blueprint
  has it misconfigured as 'parquet' reading a CSV file — LLM should detect
  format mismatch and fix 'format' to 'csv'.
blueprint: ../blueprints/example.yml
inject_failure:
  module: raw_users
  error_message: >
    IngressError: [raw_users] source not found or unreadable at 'data_dir/users.csv':
    AnalysisException: Unable to infer schema for Parquet. It must be specified manually.
  stack_trace: |
    Traceback (most recent call last):
      File "aqueduct/executor/spark/ingress.py", line 61, in read_ingress
        df = reader.load(path)
      File "pyspark/sql/readwriter.py", line 228, in load
        return self._df(self._jreader.load(path))
    AnalysisException: Unable to infer schema for Parquet. It must be specified manually.

expected_patch:
  ops:
    - op: set_module_config_key
      module_id: raw_users
      key: format
      value_contains: "csv"
  forbidden_ops:
    - replace_context_value    # format is a literal in this blueprint

assertions:
  - patch_is_valid: true
  - patch_applies: true
