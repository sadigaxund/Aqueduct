aqueduct_scenario: "1.0"

id: format_csv_read_as_parquet
description: >
  Ingress users_raw declares format: parquet but the file at the path is actually CSV.
blueprint: blueprints/03_format_csv_read_as_parquet.yml

inject_failure:
  module: users_raw
  error_message: |
    pyspark.errors.exceptions.captured.AnalysisException: [UNABLE_TO_INFER_SCHEMA] Unable to infer schema for Parquet. It must be specified manually. SQLSTATE: 42KD9
      at org.apache.spark.sql.execution.datasources.DataSource.getOrInferFileFormatSchema(DataSource.scala:201)
      at org.apache.spark.sql.execution.datasources.DataSource.resolveRelation(DataSource.scala:411)
    (Ingress users_raw — reader.format("parquet").load("data/input/users.csv"))

expected_patch:
  effect:
    module: users_raw
    config_contains:
      format: "csv"   # raw substring match — bare string equality also matches

assertions:
  - patch_is_valid: true
  - patch_applies: true
  - root_cause_contains: ["parquet", "csv", "schema"]
