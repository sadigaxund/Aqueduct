aqueduct_scenario: "1.0"

id: type_string_vs_numeric
description: >
  clean_events does SUM(event_id), but event_id is read from CSV as STRING — the numeric aggregate fails.
blueprint: blueprints/05_type_string_vs_numeric.yml

inject_failure:
  module: clean_events
  error_message: |
    pyspark.errors.exceptions.captured.AnalysisException: [DATATYPE_MISMATCH.UNEXPECTED_INPUT_TYPE] Cannot resolve "sum(event_id)" due to data type mismatch: The first parameter requires the ("NUMERIC" or "INTERVAL DAY TO SECOND" or "INTERVAL YEAR TO MONTH" or "INTERVAL") type, however "event_id" has the type "STRING". SQLSTATE: 42K09
    == SQL (line 2, position 8) ==
          SUM(event_id) AS event_id_total
          ^^^^^^^^^^^^^
    'Aggregate [user_id#30], [user_id#30, sum(event_id#29) AS event_id_total]
    +- SubqueryAlias events_raw
       +- Relation [event_id#29,user_id#30,event_time#31,event_type#32] csv

# Op-agnostic + diagnosis. Strict op-shape pin removed — see TODOs Phase
# 33 (`_match_op_spec`).
expected_patch:
  ops:
    - module_id: clean_events   # op-agnostic gating: patch must modify the failing module

assertions:
  - patch_is_valid: true
  - patch_applies: true
  - root_cause_contains: ["event_id", "string", "numeric", "type"]
