aqueduct_scenario: "1.0"

id: type_string_vs_numeric
description: >
  clean_events does SUM(event_id), but event_id is read from CSV as STRING — the numeric aggregate fails.
blueprint: blueprints/05_type_string_vs_numeric.yml

inject_failure:
  module: clean_events
  error_message: |
    pyspark.errors.exceptions.captured.AnalysisException: [DATATYPE_MISMATCH.UNEXPECTED_INPUT_TYPE] Cannot resolve "sum(event_id)" due to data type mismatch: The first parameter requires the ("NUMERIC" or "INTERVAL DAY TO SECOND" or "INTERVAL") type, however "event_id" has the type "STRING". SQLSTATE: 42K09
    == SQL (line 2, position 8) ==
          SUM(event_id) AS event_id_total
          ^^^^^^^^^^^^^
    'Aggregate [user_id#30], [user_id#30, sum(event_id#29) AS event_id_total]
    +- SubqueryAlias events_raw
       +- Relation [event_id#29,user_id#30,event_time#31,event_type#32] csv

# Multiple valid fixes: (a) CAST in the clean_events query, (b) typed
# schema_hint on the events_raw ingress, (c) a stronger CSV reader option.
# Effect-based grader pins ONE target module, so we deliberately omit
# `effect:` here and gate on `patch_applies` only — the post-patch
# blueprint must still parse + compile. The fix quality is captured by
# `root_cause_contains`.
expected_patch: {}

assertions:
  - patch_is_valid: true
  - patch_applies: true
  - root_cause_contains: ["event_id", "string", "numeric", "type"]
