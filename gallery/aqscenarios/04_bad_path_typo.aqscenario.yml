aqueduct_scenario: "1.0"

id: bad_path_typo
description: >
  events_raw path has a typo (data/input/events_raw.csv); the real file is data/input/events.csv.
blueprint: blueprints/04_bad_path_typo.yml

inject_failure:
  module: events_raw
  error_message: |
    pyspark.errors.exceptions.captured.AnalysisException: [PATH_NOT_FOUND] Path does not exist: file:/work/data/input/events_raw.csv. SQLSTATE: 42K03
      at org.apache.spark.sql.errors.QueryCompilationErrors$.dataPathNotExistError(QueryCompilationErrors.scala:1389)
      at org.apache.spark.sql.execution.datasources.DataSource.checkAndGlobPathIfNecessary(DataSource.scala:765)
    (Ingress events_raw — reader.format("csv").load("data/input/events_raw.csv"))

expected_patch:
  effect:
    module: events_raw
    config_contains:
      path: "events.csv"   # raw substring on path — accepts data/input/events.csv

assertions:
  - patch_is_valid: true
  - patch_applies: true
  - root_cause_contains: ["events_raw.csv", "events.csv", "path"]
