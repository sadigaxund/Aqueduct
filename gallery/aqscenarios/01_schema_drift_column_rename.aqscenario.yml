aqueduct_scenario: "1.0"

id: schema_drift_column_rename
description: >
  Upstream renamed event_ts to event_time, causing downstream clean_events to fail to resolve the column.
blueprint: blueprints/pipeline.yml

inject_failure:
  module: clean_events
  error_message: |
    pyspark.errors.exceptions.captured.AnalysisException: [UNRESOLVED_COLUMN.WITH_SUGGESTION] A column, variable, or function parameter with name `event_ts` cannot be resolved. Did you mean one of the following? [`event_id`, `event_time`, `user_id`, `event_type`]. SQLSTATE: 42703
    == SQL (line 3, position 8) ==
      CAST(event_ts AS timestamp) as event_time
           ^^^^^^^^
    'Project [event_id#41, user_id#42, cast('event_ts as timestamp) AS event_time#48, event_type#44]
    +- SubqueryAlias events_raw
       +- Relation [event_id#41,user_id#42,event_time#43,event_type#44] csv
  # Phase 35 — structured Spark error fields. Mirrors what
  # surveyor._extract_structured_error pulls from a live PySparkException so the
  # benchmark grader exercises the same prompt branch as production.
  structured:
    error_class: UNRESOLVED_COLUMN.WITH_SUGGESTION
    sql_state: "42703"
    object_name: event_ts
    suggested_columns: [event_id, event_time, user_id, event_type]
    root_exception:
      type: org.apache.spark.sql.AnalysisException
      message: "[UNRESOLVED_COLUMN.WITH_SUGGESTION] A column, variable, or function parameter with name `event_ts` cannot be resolved."

# Phase 33 Part B Scope C — effect-based grader. Graded on the POST-PATCH
# blueprint, not op-name equality. Any valid op (set_module_config_key /
# replace_module_config / etc.) that lands the right `query` value passes.
# SQL substring is sqlglot-AST-normalized so whitespace / quote / alias-case
# differences don't trip false fails.
expected_patch:
  effect:
    module: clean_events
    config_contains:
      query: "event_time"   # AST-normalized substring on SQL-typed field

assertions:
  - patch_is_valid: true
  - patch_applies: true
  - root_cause_contains: ["event_ts", "event_time"]
