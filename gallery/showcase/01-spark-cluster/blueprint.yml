aqueduct: "1.0"
id: showcase.spark.cluster
name: "Spark Cluster + S3A Showcase"
description: >
  Sales transaction ETL running on a 2-worker Spark Standalone cluster
  with MinIO as object storage. Showcases remote execution, S3A connectivity,
  inline data quality gates, and spillway error routing.

modules:
  - id: raw_transactions
    type: Ingress
    label: "Load transactions from MinIO"
    config:
      format: parquet
      path: "s3a://showcase/input/transactions.parquet"

  - id: clean_transactions
    type: Channel
    label: "Filter and normalize"
    config:
      op: sql
      query: |
        SELECT
          transaction_id,
          UPPER(region)      AS region,
          amount,
          status,
          event_time
        FROM raw_transactions
        WHERE status = 'completed'
      spillway_condition: "amount IS NULL OR status != 'completed'"

  - id: quality_gate
    type: Assert
    label: "Data quality checks"
    config:
      rules:
        - type: min_rows
          min: 100
          on_fail: abort

        - type: null_rate
          column: amount
          fraction: 0.1
          max: 0.05
          on_fail: abort

        - type: freshness
          column: event_time
          max_age_hours: 8760
          on_fail: warn

  - id: transactions_output
    type: Egress
    label: "Write clean transactions to MinIO"
    config:
      format: parquet
      path: "s3a://showcase/output/clean/"
      mode: overwrite
      partition_by:
        - region

  - id: rejected_output
    type: Egress
    label: "Write rejected rows to MinIO"
    config:
      format: parquet
      path: "s3a://showcase/output/rejected/"
      mode: overwrite

edges:
  - from: raw_transactions
    to: clean_transactions

  - from: clean_transactions
    to: quality_gate

  - from: clean_transactions
    to: rejected_output
    port: spillway

  - from: quality_gate
    to: transactions_output
