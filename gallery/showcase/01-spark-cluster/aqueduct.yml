aqueduct_config: "1.0"

deployment:
  master_url: "spark://${HOST_IP}:7077"
  env: cluster

spark_config:
  spark.driver.host: "${DRIVER_HOST}"
  spark.driver.bindAddress: "0.0.0.0"
  spark.driver.port: "0"
  spark.blockManager.port: "0"
  spark.driver.extraClassPath: "${PWD}/jars/*"
  spark.hadoop.fs.s3a.endpoint: "http://${HOST_IP}:9000"
  spark.hadoop.fs.s3a.access.key: "minioadmin"
  spark.hadoop.fs.s3a.secret.key: "minioadmin"
  spark.hadoop.fs.s3a.path.style.access: "true"
  spark.hadoop.fs.s3a.impl: "org.apache.hadoop.fs.s3a.S3AFileSystem"
  spark.hadoop.fs.s3a.connection.ssl.enabled: "false"
  spark.sql.shuffle.partitions: "4"

warnings:
  suppress: ["*"]

stores:
  observability:
    backend: postgres
    path: "postgresql://aqueduct:aqueduct@${HOST_IP}:5432/aqueduct_db"
  lineage:
    backend: postgres
    path: "postgresql://aqueduct:aqueduct@${HOST_IP}:5432/aqueduct_db"
  depot:
    backend: postgres
    path: "postgresql://aqueduct:aqueduct@${HOST_IP}:5432/aqueduct_db"
