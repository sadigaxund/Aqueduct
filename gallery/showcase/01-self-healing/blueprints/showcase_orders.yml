# showcase_orders.yml
# Order Processing Pipeline — Self-Healing Showcase
#
# The smallest useful demonstration of the healing loop:
#   Ingress -> Channel (compute) -> Channel (bug) -> Assert -> Egress

aqueduct: "1.0"
id: showcase.self_healing.orders
name: "Order Processing Pipeline"

context:
  env: ${AQ_ENV:-dev}
  data_dir: "../data"

modules:

  - id: ingest_orders
    label: "Source — Orders Feed"
    type: Ingress
    config:
      format: csv
      path: "${ctx.data_dir}/input/orders.csv"
      options: {header: "true", inferSchema: "true"}
      schema_hint:
        order_ref: string
        customer_id: string
        product_id: string
        quantity: integer
        unit_price: double
        order_date: date
        status: string

  - id: compute_totals
    label: "Compute Order Totals"
    type: Channel
    config:
      op: sql
      query: >
        SELECT *, quantity * unit_price AS total_value
        FROM __input__

  # NOTE: References `total_val` which DOES NOT EXIST (deliberate bug).
  # The correct column, computed one step upstream, is `total_value`.
  # Run with an agent configured and watch the healing loop fix it.
  - id: classify_priority
    label: "Classify Order Priority"
    type: Channel
    config:
      op: sql
      query: >
        SELECT *,
          CASE
            WHEN total_val >= 500 THEN 'express'
            WHEN total_val >= 100 THEN 'standard'
            ELSE 'bulk'
          END AS priority_tier
        FROM __input__

  - id: quality_gate
    label: "Data Quality Gate"
    type: Assert
    config:
      rules:
        - id: strict_not_null
          type: not_null
          column: order_ref
          on_fail: quarantine
        - id: valid_metrics
          type: sql_row
          expr: "quantity > 0 AND unit_price > 0"
          on_fail: quarantine
          error_type: DataQualityViolation

  - id: store_orders
    label: "Classified Orders"
    type: Egress
    config:
      format: parquet
      path: "${ctx.data_dir}/output/orders.parquet"
      mode: overwrite
      coalesce: 1

  - id: quarantine_storage
    label: "Quarantined Records"
    type: Egress
    config:
      format: parquet
      path: "${ctx.data_dir}/output/quarantine.parquet"
      mode: overwrite
      coalesce: 1

edges:
  - from: ingest_orders
    to: compute_totals
  - from: compute_totals
    to: classify_priority
  - from: classify_priority
    to: quality_gate
  - from: quality_gate
    to: store_orders
  - from: quality_gate
    to: quarantine_storage
    port: spillway

# ── Self-healing agent ──────────────────────────────────────────────
agent:
  approval: auto
  confidence_threshold: 0.7
  max_patches: 3
