# arcades/product_enrichment.yml
# Reusable sub-pipeline that joins orders against the product catalog.
# Takes TWO real upstream inputs (wired by the parent) — orders_ref and
# products_ref — rather than loading its own CSV, so this arcade has a
# single unambiguous entry module and stays parent-agnostic: any two
# module ids can be passed in via context_override.

aqueduct: "1.0"
id: arcade.product_enrichment
name: "Product Enrichment Arcade"

required_context:
  - orders_ref
  - products_ref

modules:
  - id: join
    label: "Join Orders with Products"
    type: Channel
    description: "Enriches each order with product name, category, and total value"
    config:
      op: sql
      query: >
        SELECT
          o.order_id,
          o.customer_id,
          o.product_id,
          p.product_name,
          p.category,
          o.quantity,
          o.unit_price,
          ROUND(o.quantity * o.unit_price, 2) AS total_value,
          CAST(o.order_date AS date) AS order_date,
          o.status
        FROM ${ctx.orders_ref} o
        JOIN ${ctx.products_ref} p ON o.product_id = p.product_id

edges: []
