# arcades/customer_enrichment.yml
# Reusable sub-pipeline that joins (already product-enriched) orders against
# customer data. Same shape as product_enrichment.yml — two real upstream
# inputs wired by the parent, single unambiguous entry module.

aqueduct: "1.0"
id: arcade.customer_enrichment
name: "Customer Enrichment Arcade"

required_context:
  - orders_ref
  - customers_ref

modules:
  - id: join
    label: "Join with Customers"
    type: Channel
    description: "Enriches each order with customer name, region, and segment"
    config:
      op: sql
      query: >
        SELECT
          o.*,
          c.customer_name,
          c.region,
          c.segment
        FROM ${ctx.orders_ref} o
        JOIN ${ctx.customers_ref} c ON o.customer_id = c.customer_id

edges: []
