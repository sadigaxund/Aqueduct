aqueduct: "1.0"
id: showcase.airflow.etl_drift
name: "ETL — schema drift defect (heal demo)"
description: >
  Same shape as etl_happy, but the Channel SQL references a column
  `total` that does not exist in orders.csv (the real column is `amount`).
  Spark raises UNRESOLVED_COLUMN with a `proposal: ["amount"]` suggestion;
  the Surveyor produces a patch that swaps `total` -> `amount` and
  exits with HEAL_PENDING (exit code 3) so the Airflow operator defers.

agent:
  # Healing config lives in this blueprint, not in aqueduct.yml, so the
  # happy-path blueprint can run with no LLM configured at all.
  #
  # Env vars below are forwarded into the container via docker-compose.yml,
  # which reads .env on the host. To customize:
  #   1. cp .env.example .env
  #   2. Edit AQ_OLLAMA_URL / AQ_OLLAMA_MODEL
  #   3. `make up` again (or `docker compose restart`)
  provider: "openai_compat"
  base_url: "${AQ_OLLAMA_URL}/v1"
  model: "${AQ_OLLAMA_MODEL}"
  timeout: 600.0
  max_reprompts: 3
  approval_mode: human            # stage patches under patches/pending/, exit 3
  on_pending_patches: block       # stop the run on pending patches → exit 3 (HEAL_PENDING)

modules:
  - id: raw_orders
    type: Ingress
    label: "Load orders CSV"
    config:
      format: csv
      path: "/opt/airflow/data/orders.csv"
      header: true
      infer_schema: true

  - id: completed_orders
    type: Channel
    label: "Keep only completed orders"
    config:
      op: sql
      query: |
        SELECT
          order_id,
          customer_id,
          total            -- DEFECT: real column is `amount`
        FROM raw_orders
        WHERE status = 'completed'

  - id: orders_output
    type: Egress
    label: "Write completed orders"
    config:
      format: parquet
      path: "/opt/airflow/data/output/etl_drift/"
      mode: overwrite

edges:
  - from: raw_orders
    to: completed_orders
  - from: completed_orders
    to: orders_output
