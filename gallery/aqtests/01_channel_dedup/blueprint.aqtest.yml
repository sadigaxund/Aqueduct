# blueprint.aqtest.yml
# Run with:  aqueduct test blueprint.aqtest.yml
#
# Isolated-module test: the `dedup_latest` Channel is fed inline rows
# (no Ingress, no Spark sources, no files) and its output is asserted.
# `__output__` is the temp view holding the module's result.

aqueduct_test: "1.0"
blueprint: blueprint.yml          # relative to this test file

tests:
  - id: keeps_only_latest_version_per_user
    module: dedup_latest
    inputs:
      raw_users:                  # upstream module id the Channel reads
        schema:
          user_id: long
          version: long
          data: string
        rows:
          - [1, 1, "old"]
          - [1, 2, "new"]
          - [2, 1, "solo"]
    assertions:
      - type: row_count
        expected: 2

      - type: contains
        rows:
          - { user_id: 1, version: 2, data: "new" }
          - { user_id: 2, version: 1, data: "solo" }

      - type: sql
        expr: "SELECT count(DISTINCT user_id) = 2 FROM __output__"

      - type: sql
        expr: "SELECT bool_and(version = 2) FROM __output__ WHERE user_id = 1"
