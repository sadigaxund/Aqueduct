# blueprint.aqtest.yml
# Run with:  aqueduct test blueprint.aqtest.yml

aqueduct_test: "1.0"
blueprint: blueprint.yml          # relative to this test file

tests:
  - id: asserts_and_quarantines_rows
    module: filter_large_amounts
    inputs:
      raw_orders:
        schema:
          order_id: long
          amount: double
        rows:
          - [1, 5.0]     # should be quarantined (amount < 10)
          - [2, 12.5]    # should pass
          - [3, 9.99]    # should be quarantined (amount < 10)
          - [4, 45.0]    # should pass
    assertions:
      - type: row_count
        expected: 2      # only 2 passing rows remain (order_id 2 and 4)

      - type: contains
        rows:
          - { order_id: 2, amount: 12.5 }
          - { order_id: 4, amount: 45.0 }

      - type: sql
        expr: "SELECT bool_and(amount >= 10.0) FROM __output__"
