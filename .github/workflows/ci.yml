name: Aqueduct CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quick-gate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      # ``[llm]`` pulls ``json-repair`` (failure-path recovery in the agent
      # reprompt loop). ``[redis]`` makes ``backend: redis`` parseable so the
      # path-resolution URI-passthrough test runs without integration markers.
      # Both extras are single-package and cheap.
      - run: pip install -e ".[dev,spark,llm,redis]"
      - run: pytest -m "not integration and not agent"

  integration-stores:
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: aq
          POSTGRES_PASSWORD: aq
          POSTGRES_DB: aq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: pip install -e ".[dev,spark,postgres,redis]"
      - name: Run Integration Tests
        env:
          AQ_PG_DSN: "postgresql://aq:aq@localhost:5432/aq_test"
          AQ_REDIS_URL: "redis://localhost:6379/15"
        run: pytest -m integration