name: Compatibility Matrix

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RESULTS_DIR: /tmp/compat-results

jobs:
  # REPRODUCIBLE LANE (Phase 78): python 3.11 + the committed environment lock
  # (requirements/ci-py311.txt, via $PIP_CONSTRAINT). Same dependency tree every
  # run — this lane must not go red because of what PyPI published this morning.
  # Contrast with the `snippets` canary below, which resolves fresh ON PURPOSE.
  unit-tests:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      PIP_CONSTRAINT: ${{ github.workspace }}/requirements/ci-py311.txt
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: pip install -e ".[dev,spark,postgres,redis]"
      - run: |
          set +e
          pytest -m "not spark and not integration and not agent" --no-cov -q --junitxml=results.xml
          rc=$?
          python scripts/ci-summary.py results.xml --name "Unit Tests"
          exit $rc

  # Gallery snippets — full end-to-end runs of every shipped example against a
  # real local Spark. Moved here from test-suite.yml (2026-07-03): these are
  # compat checks, not per-push unit checks. The suite keeps the fast
  # parse/compile `gallery-tests` guard for branch pushes.
  #
  # CANARY LANE (Phase 78): `pip install -e ".[dev,spark,llm]"` below installs
  # UNPINNED latest dependency versions — the opposite of the `compat` job's
  # 3 pinned combos. It exists to catch a breaking upstream release early
  # (e.g. it once pulled unreleased pandas 3.0/numpy 2.5 and broke snippet 28)
  # without blocking `main`. `continue-on-error: true` makes a failure here
  # a red job annotation, not a workflow failure — see docs/compatibility.md
  # "Promised vs canary lanes".
  #
  # DO NOT SET $PIP_CONSTRAINT ON THIS JOB. The environment lock added in Phase 78
  # (requirements/ci-py311.txt) pins every OTHER lane precisely so this one can stay
  # free: resolving fresh is what makes the canary go red first when upstream drifts,
  # and that early warning IS the feature. Constraining it would silently delete the
  # only lane that watches upstream. It is unpinned on purpose, not by omission.
  snippets:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: pip install -e ".[dev,spark,llm]"
      - run: bash scripts/run_snippets.sh

  # PROMISE LANES (Phase 78): the 3 pinned combos below (LTS / Latest / Legacy)
  # are the versions Aqueduct is actually tested against and supports — see
  # docs/compatibility.md. A failure here MUST fail this workflow (no
  # job-or-step-level continue-on-error) — contrast with the unpinned
  # `snippets` canary lane above, which is early-warning only.
  #
  # These lanes are REPRODUCIBLE, so they also install under the environment lock:
  # $PIP_CONSTRAINT points at requirements/compat-py<matrix.python>.txt (one file
  # per interpreter — a single lock cannot serve three pythons). Those files
  # deliberately carry NO pyspark/delta-spark pin: the matrix owns that axis (the
  # Legacy combo installs pyspark 3.5.8 explicitly, which a pinned constraint would
  # collide with). Everything else is locked, so a promise lane cannot go red merely
  # because a transitive dep released this morning — that job belongs to the canary.
  compat:
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - combo: Latest
            python: "3.13"
            pyspark: "4.1.2"
            delta: "4.2.0"
            postgres: "18.4"
            java: "21"
          - combo: LTS
            python: "3.11"
            pyspark: "4.1.2"
            delta: "4.1.0"
            postgres: "17.10"
            java: "17"
          - combo: Legacy
            python: "3.12"
            pyspark: "3.5.8"
            delta: "3.3.0"
            postgres: "17.10"
            java: "17"
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: aq
          POSTGRES_PASSWORD: aq
          POSTGRES_DB: aq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # One lock per interpreter; see the PROMISE LANES comment above.
      PIP_CONSTRAINT: ${{ github.workspace }}/requirements/compat-py${{ matrix.python }}.txt
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev,postgres,redis]"
          if [ "${{ matrix.pyspark }}" = "3.5.8" ]; then
            pip install pyspark==${{ matrix.pyspark }} delta-spark==${{ matrix.delta }}
          else
            pip install -e ".[spark]"
          fi

      - name: Run tests
        id: tests
        env:
          AQ_PG_DSN: "postgresql://aq:aq@localhost:5432/aq_test"
          AQ_SPARK_MASTER: "local[1]"
          # Provision Hudi/Iceberg jars from Maven coords derived off the
          # matrix pyspark version; per-datasource self-skip when no build
          # exists for that Spark line (Iceberg has no Spark 4.1 runtime).
          AQ_LAKEHOUSE: "1"
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}
          LOGFILE=$(mktemp)
          set +e
          pytest \
            tests/test_executor/ \
            tests/test_compiler/test_blueprints.py \
            tests/test_stores/ \
            -m "spark" \
            --tb=short \
            --no-cov \
            -q \
            --junitxml=${{ env.RESULTS_DIR }}/${{ matrix.combo }}.xml \
            2>&1 | tee "$LOGFILE"
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          # Extract a short summary line
          SUMMARY=$(grep -E "^[0-9]+ passed|^[0-9]+ failed|^[0-9]+ skipped" "$LOGFILE" | tail -1 || echo "no summary")
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          # Count failures
          FAIL_COUNT=$(grep -c "^FAILED " "$LOGFILE" || true)
          echo "fail_count=$FAIL_COUNT" >> $GITHUB_OUTPUT
          exit $EXIT_CODE
        # Phase 78: NO continue-on-error — this is a PROMISE lane. A test
        # failure on a pinned combo must fail the job (and therefore the
        # workflow), matching "promised = CI-enforced" in
        # docs/compatibility.md. The steps below still run via `if: always()`
        # so the compat-results table and compatibility.md stay up to date
        # even when a combo fails — only the job's pass/fail conclusion (the
        # thing that blocks) changes.

      - name: Generate report
        if: always()
        run: python scripts/ci-summary.py ${{ env.RESULTS_DIR }}/${{ matrix.combo }}.xml --name "${{ matrix.combo }} (${{ matrix.python }}/pyspark ${{ matrix.pyspark }})"

      - name: Save result artifact
        if: always()
        run: |
          cat > ${{ env.RESULTS_DIR }}/${{ matrix.combo }}.json << JSONEOF
          {
            "combo": "${{ matrix.combo }}",
            "python": "${{ matrix.python }}",
            "pyspark": "${{ matrix.pyspark }}",
            "delta": "${{ matrix.delta }}",
            "postgres": "${{ matrix.postgres }}",
            "java": "${{ matrix.java }}",
            "exit_code": ${{ steps.tests.outputs.exit_code }},
            "fail_count": ${{ steps.tests.outputs.fail_count }},
            "summary": $(echo "${{ steps.tests.outputs.summary }}" | jq -Rs .)
          }
          JSONEOF

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.combo }}
          path: ${{ env.RESULTS_DIR }}/${{ matrix.combo }}.json

  aggregate:
    needs: compat
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          merge-multiple: true
          path: ${{ env.RESULTS_DIR }}

      - name: Check results exist
        run: |
          COUNT=$(ls "${{ env.RESULTS_DIR }}"/*.json 2>/dev/null | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "No results to aggregate — compat job was skipped"
            exit 0
          fi
          echo "Found $COUNT result(s)"

      - name: Build results table
        id: build
        run: |
          if ! ls "${{ env.RESULTS_DIR }}"/*.json 2>/dev/null; then
            echo "No results files — skipping"
            exit 0
          fi
          # NOTE: the generated region must stay deterministic — anything that
          # changes every run (commit SHA, timestamp) would defeat the
          # `git diff --staged --quiet` guard below and produce a churn commit
          # on every push to main. Provenance lives in the commit history (the
          # commit's parent is the tested commit), not in the file body.
          TABLE_FILE=/tmp/compat_table.md
          > "$TABLE_FILE"
          echo "## Latest run" >> "$TABLE_FILE"
          echo "" >> "$TABLE_FILE"
          echo "| Combo | Python | Spark | Delta | Postgres | Java | Status |" >> "$TABLE_FILE"
          echo "|---|---|---|---|---|---|---|" >> "$TABLE_FILE"

          for f in "${{ env.RESULTS_DIR }}"/*.json; do
            NAME=$(jq -r '.combo' "$f")
            PY=$(jq -r '.python' "$f")
            SP=$(jq -r '.pyspark' "$f")
            DL=$(jq -r '.delta' "$f")
            PG=$(jq -r '.postgres' "$f")
            JV=$(jq -r '.java' "$f")
            RC=$(jq -r '.exit_code' "$f")
            FC=$(jq -r '.fail_count' "$f")

            if [ "$RC" = "0" ]; then
              STATUS="✅"
            elif [ "$FC" != "0" ]; then
              STATUS="❌ $FC failure(s)"
            else
              STATUS="⚠ infra error"
            fi

            echo "| $NAME | $PY | $SP | $DL | $PG | $JV | $STATUS |" >> "$TABLE_FILE"
          done

          echo "table_file=$TABLE_FILE" >> "$GITHUB_OUTPUT"

      - name: Update compatibility.md
        if: steps.build.outputs.table_file != ''
        run: |
          python3 << 'PYEOF'
          import re, sys

          MARKER_START = '<!-- COMPAT_RESULTS_START -->'
          MARKER_END   = '<!-- COMPAT_RESULTS_END -->'

          with open('docs/compatibility.md') as f:
              content = f.read()

          with open('/tmp/compat_table.md') as f:
              table = f.read()

          result = re.sub(
              re.escape(MARKER_START) + '.*?' + re.escape(MARKER_END),
              f'{MARKER_START}\n{table.rstrip()}\n{MARKER_END}',
              content,
              flags=re.DOTALL,
          )

          with open('docs/compatibility.md', 'w') as f:
              f.write(result)
          print("compatibility.md updated")
          PYEOF

      - name: Commit results
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add docs/compatibility.md
          git diff --staged --quiet || \
            git commit -m "docs: update compatibility matrix [skip ci]" && \
            git push
