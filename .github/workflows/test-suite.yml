name: Test Suite

# Trigger design (2026-07-03): branch pushes prove the SHA; the PR to main
# re-ran the identical suite on the identical commit, so the pull_request
# trigger was dropped. main is in the push list so post-merge skew is still
# caught (and that's where coverage runs). Revisit if external contributors
# arrive (fork PRs would need the pull_request trigger back).
on:
  push:
    branches: [feat/**, phase/**, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      parser:    ${{ steps.filter.outputs.parser }}
      compiler:  ${{ steps.filter.outputs.compiler }}
      executor:  ${{ steps.filter.outputs.executor }}
      surveyor:  ${{ steps.filter.outputs.surveyor }}
      agent:     ${{ steps.filter.outputs.agent }}
      patch:     ${{ steps.filter.outputs.patch }}
      stores:    ${{ steps.filter.outputs.stores }}
      cli:       ${{ steps.filter.outputs.cli }}
      config:    ${{ steps.filter.outputs.config }}
      gallery:   ${{ steps.filter.outputs.gallery }}
      drift:     ${{ steps.filter.outputs.drift }}
      tui:       ${{ steps.filter.outputs.tui }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            parser:
              - 'aqueduct/parser/**'
              - 'tests/test_parser/**'
            compiler:
              - 'aqueduct/compiler/**'
              - 'tests/test_compiler/**'
            executor:
              - 'aqueduct/executor/**'
              - 'tests/test_executor/**'
              - 'tests/test_blueprints.py'
            surveyor:
              - 'aqueduct/surveyor/**'
              - 'aqueduct/infra/**'
              - 'tests/test_surveyor/**'
            agent:
              - 'aqueduct/agent/**'
              - 'aqueduct/infra/**'
              - 'tests/test_agent/**'
            patch:
              - 'aqueduct/patch/**'
              - 'tests/test_patch/**'
            stores:
              - 'aqueduct/stores/**'
              - 'tests/test_stores/**'
              - 'tests/test_depot/**'
            cli:
              - 'aqueduct/cli/**'
              - 'tests/test_cli/**'
            config:
              - 'aqueduct/config.py'
              - 'aqueduct/redaction.py'
              - 'aqueduct/secrets.py'
              - 'aqueduct/warnings.py'
              - 'tests/test_config.py'
              - 'tests/test_parser/test_config.py'
              - 'tests/test_redaction.py'
              - 'tests/test_secrets.py'
              - 'tests/test_warnings.py'
            gallery:
              - 'gallery/**'
              - 'tests/test_gallery.py'
              - 'aqueduct/parser/**'
              - 'aqueduct/compiler/**'
            drift:
              - 'aqueduct/drift/**'
              - 'tests/test_drift/**'
            tui:
              - 'aqueduct/tui/**'
              - 'tests/test_tui/**'

  # ── Unit-test layer — fast, no Spark needed ──────────────────────────

  parser-tests:
    needs: changes
    if: ${{ needs.changes.outputs.parser == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,llm,redis,postgres]"
      - run: pytest tests/test_parser/ -m "not spark"

  compiler-tests:
    needs: changes
    if: ${{ needs.changes.outputs.compiler == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,llm,redis]"
      - run: pytest tests/test_compiler/ -m "not spark"

  surveyor-tests:
    needs: changes
    if: ${{ needs.changes.outputs.surveyor == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,llm,redis]"
      - run: pytest tests/test_surveyor/ tests/test_benchmark_store.py -m "not spark"

  agent-tests:
    needs: changes
    if: ${{ needs.changes.outputs.agent == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,llm,redis]"
      - run: pytest tests/test_agent/ -m "not spark"

  patch-tests:
    needs: changes
    if: ${{ needs.changes.outputs.patch == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,llm,redis]"
      - run: pytest tests/test_patch/ -m "not spark"

  drift-tests:
    needs: changes
    if: ${{ needs.changes.outputs.drift == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,llm,redis]"
      - run: pytest tests/test_drift/ -m "not spark"

  cli-tests:
    needs: changes
    if: ${{ needs.changes.outputs.cli == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: pip install -e ".[dev,spark,llm,redis]"
      - run: pytest tests/test_cli/

  tui-tests:
    needs: changes
    if: ${{ needs.changes.outputs.tui == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,tui]"
      - run: pytest tests/test_tui/ -m "not spark"

  config-tests:
    needs: changes
    if: ${{ needs.changes.outputs.config == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,llm,redis]"
      - run: pytest tests/test_config.py tests/test_parser/test_config.py tests/test_redaction.py tests/test_secrets.py tests/test_warnings.py -m "not spark"

  # ── Spark layer — needs local[1] via setup-java ──────────────────────

  executor-tests:
    needs: changes
    if: ${{ needs.changes.outputs.executor == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: pip install -e ".[dev,spark,llm,redis]"
      # AQ_LAKEHOUSE lets conftest provision Hudi/Iceberg jars (Maven coords
      # derived from the installed pyspark version); tests self-skip for any
      # datasource with no build for this Spark line (e.g. Iceberg on 4.1).
      - run: pytest tests/test_executor/ tests/test_compiler/test_blueprints.py -m spark
        env:
          AQ_LAKEHOUSE: "1"

  # (The slow full-run `snippets` job moved to version-matrix.yml — snippets
  # are end-to-end compat checks, not per-push unit checks. They run there on
  # main pushes + workflow_dispatch; the fast `gallery-tests` guard below
  # still parse/compiles every example on branch pushes.)

  # ── Gallery guard — fast parse/compile/load of every shipped example ──
  # Complements the slow `snippets` full-run job: catches gallery rot in
  # seconds without executing 20 Spark pipelines. Needs Java for the
  # aqtest cases that run on a real local[1] Spark.

  gallery-tests:
    needs: changes
    if: ${{ needs.changes.outputs.gallery == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: pip install -e ".[dev,spark,llm]"
      - run: pytest tests/test_gallery.py

  # ── Store integration layer — needs PG + Redis ───────────────────────

  stores-tests:
    needs: changes
    if: ${{ needs.changes.outputs.stores == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: aq
          POSTGRES_PASSWORD: aq
          POSTGRES_DB: aq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: pip install -e ".[dev,spark,postgres,redis]"
      - name: Run Integration Tests
        env:
          AQ_PG_DSN: "postgresql://aq:aq@localhost:5432/aq_test"
          AQ_REDIS_URL: "redis://localhost:6379/15"
        run: pytest tests/test_stores/ tests/test_depot/ tests/test_benchmark_store.py -m integration

  # ── Coverage — dedicated job, decoupled from Spark to avoid session flakiness ──
  # Runs the full pure-Python suite under coverage. Spark tests are excluded
  # because the shared-session Spark fixture destabilises under coverage
  # tracing (~154 flaky Py4JJavaError failures vanish under --no-cov).
  # The 80% gate covers the pure-Python layers (the bulk of the codebase).

  coverage:
    # main-only (post-merge) + manual — the pre-merge PR run was the same
    # suite twice; branch pushes already prove the code, coverage gates main.
    if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,llm,redis,stores]"
      - run: pytest --cov=aqueduct --cov-report=term-missing --cov-fail-under=80 -m "not spark"
