# aqueduct.yml — Engine Configuration Template
#
# This file configures the Aqueduct engine (deployment target, Spark, stores,
# probes, secrets, webhooks). It is NOT a pipeline definition.
#
# Rename to aqueduct.yml and place in your project root (or pass with --config).
# All sections are optional — omitting this file entirely uses local Spark with
# DuckDB stores in .aqueduct/.
#
# CLI flags override values here; Blueprint spark_config overrides spark_config below.
# LLM agent config (model, provider, approval_mode) belongs in the Blueprint agent:
# block — each pipeline manages its own healing policy independently.
#
# Usage:
#   aqueduct run pipeline.yml                      # auto-discovers aqueduct.yml in CWD
#   aqueduct run pipeline.yml --config aqueduct.yml
#   aqueduct check-config                          # validate without running a pipeline

aqueduct_config: "1.0"


# ── Deployment ────────────────────────────────────────────────────────────────

deployment:
  # engine: execution engine.
  # Currently supported: spark
  # Planned (not yet implemented): flink
  engine: spark

  # target: informational label (local | standalone | yarn | kubernetes | databricks | emr | dataproc)
  target: local

  # master_url: passed verbatim to SparkSession.builder.master()
  master_url: "local[*]"
  # master_url: "local[4]"                         # 4 threads
  # master_url: "spark://host:7077"                # Spark Standalone
  # master_url: "yarn"                             # YARN (needs HADOOP_CONF_DIR)
  # master_url: "k8s://https://k8s-apiserver:443"  # Kubernetes
  # master_url: "sc://databricks-host:443"         # Databricks Connect


# ── Spark Configuration ───────────────────────────────────────────────────────
#
# Any spark.* key accepted. Merged with Blueprint spark_config at runtime
# (Blueprint values win on conflict).

spark_config: {}

  # ── Object storage — MinIO / S3-compatible ──────────────────────────────────
  # spark.hadoop.fs.s3a.endpoint: "http://minio:9000"
  # spark.hadoop.fs.s3a.path.style.access: "true"
  # spark.hadoop.fs.s3a.access.key: "@aq.secret('MINIO_ACCESS_KEY')"
  # spark.hadoop.fs.s3a.secret.key: "@aq.secret('MINIO_SECRET_KEY')"
  # spark.jars.packages: "org.apache.hadoop:hadoop-aws:3.3.4"

  # ── Object storage — AWS S3 (IAM role or key-pair) ──────────────────────────
  # spark.hadoop.fs.s3a.aws.credentials.provider: "com.amazonaws.auth.InstanceProfileCredentialsProvider"
  # spark.hadoop.fs.s3a.access.key: "@aq.secret('AWS_ACCESS_KEY_ID')"
  # spark.hadoop.fs.s3a.secret.key: "@aq.secret('AWS_SECRET_ACCESS_KEY')"
  # spark.jars.packages: "org.apache.hadoop:hadoop-aws:3.3.4"

  # ── Object storage — Google Cloud Storage ───────────────────────────────────
  # spark.hadoop.google.cloud.auth.service.account.enable: "true"
  # spark.hadoop.google.cloud.auth.service.account.json.keyfile: "/secrets/gcp-key.json"
  # spark.jars.packages: "com.google.cloud.bigdataoss:gcs-connector:hadoop3-2.2.11"

  # ── JDBC ────────────────────────────────────────────────────────────────────
  # spark.jars: "/opt/jars/postgresql-42.6.0.jar"
  # spark.jars.packages: "org.postgresql:postgresql:42.6.0"

  # ── Delta Lake ──────────────────────────────────────────────────────────────
  # spark.jars.packages: "io.delta:delta-spark_2.12:3.2.0"
  # spark.sql.extensions: "io.delta.sql.DeltaSparkSessionExtension"
  # spark.sql.catalog.spark_catalog: "org.apache.spark.sql.delta.catalog.DeltaCatalog"

  # ── Resource sizing ─────────────────────────────────────────────────────────
  # spark.driver.memory: "4g"
  # spark.executor.memory: "8g"
  # spark.executor.cores: "4"
  # spark.executor.instances: "10"
  # spark.sql.shuffle.partitions: "200"

  # ── Serialization ───────────────────────────────────────────────────────────
  # spark.serializer: "org.apache.spark.serializer.KryoSerializer"

  # ── Adaptive Query Execution (Spark 3+) ─────────────────────────────────────
  # spark.sql.adaptive.enabled: "true"
  # spark.sql.adaptive.coalescePartitions.enabled: "true"


# ── Stores ────────────────────────────────────────────────────────────────────
#
# All stores default to local DuckDB files under .aqueduct/.

stores:

  observability:
    backend: duckdb
    path: ".aqueduct/signals"
    # path: "s3://my-bucket/aqueduct/signals"

  lineage:
    backend: duckdb
    path: ".aqueduct/lineage"

  depot:
    backend: duckdb
    path: ".aqueduct/depot.duckdb"
    # path: "s3://my-bucket/aqueduct/depot.duckdb"


# ── Probes ────────────────────────────────────────────────────────────────────

probes:
  max_sample_rows: 100
  default_sample_fraction: 0.01
  block_full_actions_in_prod: true


# ── Secrets ───────────────────────────────────────────────────────────────────
#
# @aq.secret('KEY') resolves via the provider below.
# "env" reads os.environ — works for local dev, CI, and secret-injected envs
# (Kubernetes Secrets, AWS SSM + env export, etc.).

secrets:
  provider: "env"
  # provider: "aws"    # AWS Secrets Manager  (future)
  # provider: "gcp"    # GCP Secret Manager   (future)
  # provider: "azure"  # Azure Key Vault       (future)
  # provider: "vault"  # HashiCorp Vault       (future)


# ── Webhooks ──────────────────────────────────────────────────────────────────
#
# Fires when a pipeline run ends with status="error".
#
# Simple form — just a URL, sends full FailureContext JSON via POST:
#   webhooks:
#     on_failure: "https://hooks.slack.com/services/T.../B.../"
#
# Full form — custom method, headers, and payload template:
#
# Template variables available in payload values and header values:
#   ${run_id}          UUID of this pipeline run
#   ${pipeline_id}     Pipeline identifier string
#   ${pipeline_name}   Pipeline display name
#   ${failed_module}   Module ID where the first failure occurred
#   ${error_message}   Human-readable error description
#   ${error_type}      Exception class name (e.g. AnalysisException)
#   ${started_at}      ISO-8601 run start timestamp
#   ${attempt}         Number of failed modules in this run
#   ${ENV_VAR}         Any env variable (useful in header values for secrets)
#
# If payload is omitted, the complete FailureContext JSON object is sent
# (run metadata, failed module, stack trace, probe signals, manifest snapshot).

webhooks:
  on_failure: null

  # ── Slack incoming webhook ───────────────────────────────────────────────────
  # on_failure:
  #   url: "${SLACK_WEBHOOK_URL}"
  #   method: POST
  #   payload:
  #     text: "Pipeline *${pipeline_id}* failed on `${failed_module}` — ${error_message}"

  # ── PagerDuty Events API v2 ──────────────────────────────────────────────────
  # on_failure:
  #   url: "https://events.pagerduty.com/v2/enqueue"
  #   method: POST
  #   headers:
  #     Authorization: "Token token=${PAGERDUTY_INTEGRATION_KEY}"
  #   payload:
  #     routing_key: "${PAGERDUTY_INTEGRATION_KEY}"
  #     event_action: trigger
  #     payload:
  #       summary: "${pipeline_name} failed: ${error_message}"
  #       severity: critical
  #       source: "aqueduct/${pipeline_id}"
  #       custom_details:
  #         run_id: "${run_id}"
  #         failed_module: "${failed_module}"

  # ── Generic webhook — full FailureContext (no payload template) ──────────────
  # on_failure:
  #   url: "https://ops.example.com/api/v1/aqueduct-failure"
  #   method: POST
  #   headers:
  #     Authorization: "Bearer ${OPS_API_TOKEN}"
  #     X-Source: "aqueduct"
  #   timeout: 15


# ── LLM Agent — Connection Defaults ──────────────────────────────────────────
#
# Sets the LLM provider, endpoint, and model used by all pipelines.
# Per-pipeline policy (approval_mode, on_pending_patches) belongs in each
# Blueprint's agent: block — not here.
#
# Blueprint agent: values override these defaults on conflict.
# If a pipeline omits agent: entirely, LLM self-healing is disabled regardless.

agent:
  # ── Anthropic (default) ────────────────────────────────────────────────────
  provider: "anthropic"              # "anthropic" | "openai_compat"
  model: "claude-sonnet-4-6"
  # ANTHROPIC_API_KEY env var required at runtime

  # ── Ollama / vLLM / LM Studio (OpenAI-compatible endpoint) ────────────────
  # provider: "openai_compat"
  # base_url: "http://10.0.0.39:11434/v1"   # /v1 suffix required
  # model: "deepseek-r1:14b"
  # ollama_options:                          # forwarded as payload["options"]
  #   num_thread: 16
  #   num_gpu: 0                             # 0 = CPU only; 99 = all on GPU
  #   mlock: true                            # lock weights in RAM (no swap)
  #   num_batch: 1024                        # prompt eval batch size
  #   num_predict: -1                        # -1 = no token limit

# ── Blueprint agent: block (policy — copy into pipeline YAML) ─────────────────
#
#   agent:
#     # approval_mode controls what happens when the pipeline fails:
#     #
#     #   disabled   — LLM never fires (default when agent: block is omitted)
#     #   human      — LLM generates patch → written to patches/pending/ → run ends
#     #                You review, then: aqueduct patch apply patches/pending/<id>.json --blueprint ...
#     #   auto       — LLM generates patch → applied in-memory → pipeline re-runs to validate
#     #                If re-run succeeds: patch written to Blueprint permanently
#     #                If re-run fails:    patch discarded, Blueprint unchanged
#     #                Only one patch attempt per run.
#     #   aggressive — LLM generates patch → written to Blueprint immediately → pipeline re-runs
#     #                Loops up to max_patches_per_run times with no validation gate.
#     #                ⚠ WARNING: Blueprint may be modified multiple times autonomously.
#     #                   All changes are permanent. Review patches/applied/ after the run.
#     approval_mode: "human"
#
#     on_pending_patches: "warn"     # ignore | warn | block
#     max_patches_per_run: 3         # max LLM patch+rerun cycles (auto: always 1; aggressive: up to N)
#
#     # ── LLM Guardrails ─────────────────────────────────────────────────────
#     # Constrain what the LLM agent is allowed to patch. Violations cause the
#     # patch to be staged for human review instead of applied automatically.
#     #
#     # allowed_paths: fnmatch patterns for config.path values the LLM may touch.
#     #   Empty list (default) = unrestricted.
#     #   Any path not matching at least one pattern → patch staged for review.
#     # allowed_paths:
#     #   - "s3a://my-bucket/prod/*"    # only prod bucket paths
#     #   - "s3a://my-bucket/staging/*"
#     #
#     # forbidden_ops: PatchSpec operation names the LLM may never use.
#     #   Empty list (default) = all ops permitted.
#     #   Matching op → patch staged for review immediately.
#     # forbidden_ops:
#     #   - remove_module              # never delete modules autonomously
#     #   - replace_retry_policy       # don't touch retry config
#
#     # Override connection defaults for this pipeline only:
#     # provider: "openai_compat"
#     # base_url: "http://10.0.0.39:11434/v1"
#     # model: "qwen2.5-coder:14b"
