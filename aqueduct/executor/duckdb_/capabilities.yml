  # ── Arrow type-hub constructors (Phase 80 work packages 2 & 3) ────────────
  # One leaf per hub type CONSTRUCTOR (aqueduct/typehub.py), verified
  # EMPIRICALLY against a real DuckDB connection (CAST through DuckDB's own
  # SQL type system), not copied from spark/capabilities.yml — same
  # leaf-by-leaf-against-a-real-test discipline as the rest of this file.
  # DuckDB natively represents all sixteen hub constructors 1:1 (TINYINT,
  # BLOB for binary, TIMESTAMPTZ for timestamp_tz, native ARRAY/MAP/STRUCT,
  # DECIMAL(p,s), ...) so every constructor is honestly `supported`. The raw
  # Blueprint type string now (work package 3) reaches
  # `duckdb_/type_render.py::normalize_type_spelling` — parsed through the
  # hub and rendered to DuckDB's real native DDL (`array<int>` -> `INTEGER[]`,
  # `timestamp_tz` -> `TIMESTAMPTZ`, ...) before the CAST — so a Blueprint
  # author writing the HUB spelling verbatim (not DuckDB's own native DDL)
  # now works too; see `test_channel_cast_hub_vocabulary_spellings` below for
  # the hub-spelling proof (the `tests:` links on each leaf below still point
  # at the native-DDL cases, which prove the ENGINE's own capability
  # independent of the mapping layer). `type.native.duckdb`
  # ("duckdb:<spelling>") is DuckDB's own native escape hatch — proven with
  # HUGEINT, a real DuckDB type outside the hub vocabulary — so `supported`;
  # `type.native.spark` names a different engine's native type system
  # DuckDB's SQL parser cannot interpret, so honestly `unsupported` (the
  # native namespace is GOVERNED per engine, not a blanket exemption).
  type.array:
    support: supported
    tests:
      - tests/test_executor_duckdb/test_executor.py::test_channel_cast_hub_type_constructors
  type.bigint:
    support: supported
    tests:
      - tests/test_executor_duckdb/test_executor.py::test_channel_cast_hub_type_constructors
  type.binary:
    support: supported
    tests:
      - tests/test_executor_duckdb/test_executor.py::test_channel_cast_hub_type_constructors
  type.boolean:
    support: supported
    tests:
      - tests/test_executor_duckdb/test_executor.py::test_channel_cast_hub_type_constructors
  type.date:
    support: supported
    tests:
      - tests/test_executor_duckdb/test_executor.py::test_channel_cast_hub_type_constructors
  type.decimal:
    support: supported
    tests:
      - tests/test_executor_duckdb/test_executor.py::test_channel_cast_hub_type_constructors
  type.double:
    support: supported
    tests:
      - tests/test_executor_duckdb/test_executor.py::test_channel_cast_hub_type_constructors
  type.float:
    support: supported
    tests:
      - tests/test_executor_duckdb/test_executor.py::test_channel_cast_hub_type_constructors
  type.int:
    support: supported
    tests:
      - tests/test_executor_duckdb/test_executor.py::test_channel_cast_hub_type_constructors
  type.map:
    support: supported
    tests:
      - tests/test_executor_duckdb/test_executor.py::test_channel_cast_hub_type_constructors
  type.native.duckdb:
    support: supported
    tests:
      - tests/test_executor_duckdb/test_executor.py::test_channel_cast_native_namespace_duckdb
  type.native.spark:
    support: unsupported
    hint: "'spark:<spelling>' names a type in Spark's native type system, which DuckDB's SQL parser does not understand. Use the hub vocabulary (bigint, array<T>, ...) or 'duckdb:<spelling>' for a DuckDB-native escape hatch."
  type.smallint:
    support: supported
    tests:
      - tests/test_executor_duckdb/test_executor.py::test_channel_cast_hub_type_constructors
  type.string:
    support: supported
