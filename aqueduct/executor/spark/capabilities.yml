  # ── Arrow type-hub constructors (Phase 80 work package 2) ─────────────────
  # One leaf per hub type CONSTRUCTOR (aqueduct/typehub.py), not per
  # instantiation — `type.array` covers every `array<T>`. Every constructor
  # is a real Spark DDL cast target (see the test cases linked below) so all
  # sixteen are honestly `supported` on Spark, the reference engine. The
  # native-namespace pair below is the governed escape hatch: `type.native.spark`
  # ("spark:<spelling>") is Spark's own type system, so it is `supported`
  # (proven by `variant`, a real Spark 4.0+ type outside the hub vocabulary);
  # `type.native.duckdb` ("duckdb:<spelling>") names a DIFFERENT engine's
  # native type system that Spark's own SQL parser cannot interpret, so it is
  # honestly `unsupported` on Spark — the native namespace is GOVERNED per
  # engine, not a blanket exemption.
  type.array:
    support: supported
    tests:
      - tests/test_executor/test_executor_channel.py::test_cast_hub_type_array_map_struct
  type.bigint:
    support: supported
    tests:
      - tests/test_executor/test_executor_channel.py::test_cast_hub_type_constructors
  type.binary:
    support: supported
    tests:
      - tests/test_executor/test_executor_channel.py::test_cast_hub_type_constructors
  type.boolean:
    support: supported
    tests:
      - tests/test_executor/test_executor_channel.py::test_cast_hub_type_constructors
  type.date:
    support: supported
    tests:
      - tests/test_executor/test_executor_channel.py::test_cast_hub_type_constructors
  type.decimal:
