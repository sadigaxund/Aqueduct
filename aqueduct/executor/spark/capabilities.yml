# Spark engine capability declaration — DATA, not code.
#
# One explicit row per capability leaf. There is NO default-verdict sweep:
# a leaf with no row here (or one left at `undeclared`) is a BUILD FAILURE at
# engine registration (aqueduct/executor/capabilities.py::load_declaration).
# That is what makes the closure guarantee real: this file (data) and the leaf
# walker (code) are two INDEPENDENT sources, so they can actually disagree.
#
# Workflow: add a schema/config key -> build breaks -> run
#   python scripts/capabilities.py sync
# which appends the new leaf here as `undeclared` -> a human replaces that with
# a real verdict for this engine.
#
# Verdicts: supported | unsupported | ignored_with_warning | undeclared
# A bare string is the verdict. A mapping carries `support:` plus optional
# `requires:` (dependency version constraints, checked by `aqueduct doctor`)
# and `hint:` (actionable text shown to the user when the leaf is refused).

