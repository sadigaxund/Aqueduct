  type.native.duckdb:
    support: unsupported
    hint: "'duckdb:<spelling>' names a type in DuckDB's native type system, which Spark's SQL parser does not understand. Use the hub vocabulary (bigint, array<T>, ...) or 'spark:<spelling>' for a Spark-native escape hatch."
