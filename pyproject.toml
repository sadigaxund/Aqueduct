[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aqueduct"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "pyspark>=3.5.0",
    "pydantic>=2.0.0",
    "pyyaml>=6.0",
    "duckdb>=0.10.0",
    "sqlglot>=23.0.0",
    "click>=8.1.0",
    "anthropic>=0.30.0",
    "ruamel.yaml>=0.18.0",
]

[project.scripts]
aqueduct = "aqueduct.cli:cli"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "black>=24.0.0",
    "ruff>=0.4.0",
]

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
addopts = "--cov=aqueduct --cov-fail-under=80 --cov-report=term-missing"
testpaths = ["tests"]
