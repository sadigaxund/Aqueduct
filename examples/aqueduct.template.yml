# aqueduct.yml — Engine configuration template
#
# This file configures the Aqueduct engine itself (deployment target, Spark,
# stores, LLM agent, observability). It is NOT a pipeline definition.
#
# All fields are optional. Omitting this file entirely is valid — Aqueduct
# defaults to local Spark with DuckDB stores in .aqueduct/.
#
# CLI flags override values here; values here override built-in defaults.
# Blueprint-level spark_config overrides the spark_config section below.
#
# Usage:
#   aqueduct run pipeline.yml --config aqueduct.yml

aqueduct_config: "1.0"


# ── Deployment ────────────────────────────────────────────────────────────────
#
# Controls which execution engine and cluster Aqueduct uses.

deployment:
  # engine: execution engine to use.
  # Currently supported: spark
  # Planned (not yet implemented): flink
  engine: spark

  # target: label for display and future routing logic (informational)
  # Options: local | standalone | yarn | kubernetes | databricks | emr | dataproc
  target: local

  # master_url: engine-specific cluster URL.
  # For Spark: passed verbatim to SparkSession.builder.master().
  master_url: "local[*]"           # local — all cores (default)
  # master_url: "local[4]"         # local — 4 threads
  # master_url: "spark://host:7077" # Spark Standalone cluster
  # master_url: "yarn"             # YARN (requires HADOOP_CONF_DIR)
  # master_url: "k8s://https://k8s-apiserver:443"  # Kubernetes
  # master_url: "sc://databricks-host:443"         # Databricks Connect


# ── Spark Configuration ────────────────────────────────────────────────────────
#
# Any spark.* key accepted here. These are merged with Blueprint-level
# spark_config at runtime (Blueprint wins on conflict).
#
# @aq.secret('ENV_VAR') reads the named environment variable at compile time.
# It is a lightweight alias for os.environ.get() — no encrypted store yet.

spark_config: {}

  # ── Object storage — MinIO / S3-compatible ──────────────────────────────────
  # spark.hadoop.fs.s3a.endpoint: "http://minio:9000"
  # spark.hadoop.fs.s3a.path.style.access: "true"
  # spark.hadoop.fs.s3a.access.key: "@aq.secret('MINIO_ACCESS_KEY')"
  # spark.hadoop.fs.s3a.secret.key: "@aq.secret('MINIO_SECRET_KEY')"
  # spark.jars.packages: "org.apache.hadoop:hadoop-aws:3.3.4"

  # ── Object storage — AWS S3 (IAM role or key-pair) ──────────────────────────
  # spark.hadoop.fs.s3a.aws.credentials.provider: "com.amazonaws.auth.InstanceProfileCredentialsProvider"
  # spark.hadoop.fs.s3a.access.key: "@aq.secret('AWS_ACCESS_KEY_ID')"
  # spark.hadoop.fs.s3a.secret.key: "@aq.secret('AWS_SECRET_ACCESS_KEY')"
  # spark.jars.packages: "org.apache.hadoop:hadoop-aws:3.3.4"

  # ── Object storage — Google Cloud Storage ───────────────────────────────────
  # spark.hadoop.google.cloud.auth.service.account.enable: "true"
  # spark.hadoop.google.cloud.auth.service.account.json.keyfile: "/secrets/gcp-key.json"
  # spark.jars.packages: "com.google.cloud.bigdataoss:gcs-connector:hadoop3-2.2.11"

  # ── JDBC ────────────────────────────────────────────────────────────────────
  # spark.jars: "/opt/jars/postgresql-42.6.0.jar"
  # spark.jars.packages: "org.postgresql:postgresql:42.6.0"

  # ── Delta Lake ──────────────────────────────────────────────────────────────
  # spark.jars.packages: "io.delta:delta-spark_2.12:3.2.0"
  # spark.sql.extensions: "io.delta.sql.DeltaSparkSessionExtension"
  # spark.sql.catalog.spark_catalog: "org.apache.spark.sql.delta.catalog.DeltaCatalog"

  # ── Resource sizing ─────────────────────────────────────────────────────────
  # spark.driver.memory: "4g"
  # spark.executor.memory: "8g"
  # spark.executor.cores: "4"
  # spark.executor.instances: "10"
  # spark.sql.shuffle.partitions: "200"   # default 200; reduce for small data

  # ── Serialization ───────────────────────────────────────────────────────────
  # spark.serializer: "org.apache.spark.serializer.KryoSerializer"
  # spark.kryo.registrationRequired: "false"

  # ── Adaptive Query Execution (Spark 3+) ─────────────────────────────────────
  # spark.sql.adaptive.enabled: "true"
  # spark.sql.adaptive.coalescePartitions.enabled: "true"


# ── Stores ────────────────────────────────────────────────────────────────────
#
# All stores default to local DuckDB files in .aqueduct/. Switch to remote
# URIs (s3://, gs://, abfss://) for team or production deployments.

stores:

  # Observability: run records, failure contexts, probe signals.
  # Query with: duckdb .aqueduct/signals/runs.db
  observability:
    backend: duckdb          # only backend supported in Core
    path: ".aqueduct/signals"
    # path: "s3://my-bucket/aqueduct/signals"   # remote (Aqueduct Platform)

  # Lineage: column-level lineage graphs captured by the Compiler.
  lineage:
    backend: duckdb
    path: ".aqueduct/lineage"

  # Depot: cross-run KV state — @aq.depot.get() / format: depot Egress.
  # Query with: duckdb .aqueduct/depot.duckdb
  depot:
    backend: duckdb
    path: ".aqueduct/depot.duckdb"
    # path: "s3://my-bucket/aqueduct/depot.duckdb"


# ── LLM Agent (self-healing) ──────────────────────────────────────────────────
#
# The agent block lives in the Blueprint YAML (not here) so each pipeline can
# configure its own healing policy. The snippet below is a reference only.
#
# Blueprint-level agent config:
#
#   agent:
#     # Whether to call the LLM at all.
#     # "disabled" → no LLM (default when agent: block is omitted)
#     # "human"    → patch written to patches/pending/ for manual review
#     # "auto"     → patch applied immediately to the Blueprint file
#     approval_mode: "human"
#
#     # What to do when patches/pending/ is non-empty at run time.
#     # "warn"   → print warning, run anyway, suppress LLM (default)
#     # "block"  → exit non-zero before execution starts
#     # "ignore" → run and call LLM regardless of pending patches
#     on_pending_patches: "warn"
#
#     # LLM provider and model.
#     provider: "anthropic"               # "anthropic" | "openai_compat" | "ollama"
#     model: "claude-sonnet-4-20250514"
#     # base_url: "http://10.0.0.39:11434"  # required for openai_compat / ollama
#
#     # Max LLM response tokens (PatchSpec JSON; 4096 is generous).
#     max_patches_per_run: 5


# ── Probes ────────────────────────────────────────────────────────────────────
#
# Probes capture schema snapshots, null rates, and sample rows lazily.
# These limits prevent runaway sampling on very large DataFrames.

probes:
  # Maximum rows kept in a sample_rows signal payload.
  max_sample_rows: 100

  # Fraction of DataFrame sampled for null-rate and sample_rows signals.
  # 0.01 = 1% — enough for signals without a full scan.
  default_sample_fraction: 0.01

  # Block count()/collect()/show() Spark actions inside Probes in production.
  # Keep true unless debugging locally — these break the zero-cost guarantee.
  block_full_actions_in_prod: true


# ── Secrets ───────────────────────────────────────────────────────────────────
#
# @aq.secret('KEY') in Blueprint YAML resolves via the provider below.
# "env" reads os.environ — suitable for local dev, CI, and secret-injection
# platforms (Kubernetes Secrets, AWS SSM + envvar export, etc.).

secrets:
  provider: "env"
  # provider: "aws"    # AWS Secrets Manager  (future)
  # provider: "gcp"    # GCP Secret Manager   (future)
  # provider: "azure"  # Azure Key Vault       (future)
  # provider: "vault"  # HashiCorp Vault       (future)


# ── Webhooks ──────────────────────────────────────────────────────────────────
#
# Aqueduct POSTs a FailureContext JSON body to on_failure when a pipeline run
# ends with status="error". Useful for Slack bots, PagerDuty, or custom tooling.

webhooks:
  on_failure: null
  # on_failure: "https://hooks.slack.com/services/T.../B.../..."
  # on_failure: "https://your-ops-platform/api/v1/aqueduct-failure"
