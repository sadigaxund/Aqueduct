# =============================================================================
# AQUEDUCT COMPREHENSIVE BLUEPRINT
# =============================================================================
# This file demonstrates all Aqueduct features.
# Status legend:
#   ✅ Implemented (Phases 1–5)
#   ⏳ Planned (Phase 6+ / Future)
# =============================================================================

aqueduct: "1.0"
id: pipeline.demo.all_features
name: "Aqueduct Feature Showcase"

description: |
  Demonstrates Ingress, Channel (SQL), Egress, Context Registry,
  Spillway routing, Probes, Regulators, Junctions, Funnels, and Arcades.
  Retry policy and agent config are included.

# -----------------------------------------------------------------------------
# CONTEXT REGISTRY (✅ Tier 0 implemented, ✅ Tier 1 implemented in Compiler)
# -----------------------------------------------------------------------------
context:
  env: ${AQUEDUCT_ENV:-dev}
  base_path: "/tmp/aqueduct-demo/${ctx.env}"
  tables:
    raw_orders:   "${ctx.base_path}/orders/raw"
    clean_orders: "${ctx.base_path}/orders/clean"
    customers:    "${ctx.base_path}/customers"
    output:       "${ctx.base_path}/orders/enriched"
  params:
    dedup_key: order_id
    quality_threshold: 0.95

# Tier 1 runtime functions (✅ resolved at compile time)
  watermark:
    last_run: "@aq.depot.get('orders.last_run', '1970-01-01')"
    run_date: "@aq.date.today()"

# -----------------------------------------------------------------------------
# MODULES
# -----------------------------------------------------------------------------
modules:
  # -------------------- INGRESS (✅) --------------------
  - id: read_orders
    type: Ingress
    label: "Read raw orders from Parquet"
    description: "Ingests the raw orders dataset with schema enforcement."
    config:
      format: parquet
      path: ${ctx.tables.raw_orders}
      schema_hint:                     # ✅ enforced at read time
        order_id: STRING
        amount: DECIMAL(18,2)
        event_ts: TIMESTAMP
        region: STRING
        customer_id: STRING
      options:
        mergeSchema: false

  # -------------------- CHANNEL (✅ SQL) --------------------
  - id: clean_orders
    type: Channel
    label: "Clean and deduplicate orders"
    description: "Remove duplicates, filter out null amounts, cast timestamps."
    config:
      op: sql
      query: |
        SELECT
          order_id,
          CAST(amount AS DECIMAL(18,2)) AS amount,
          TO_TIMESTAMP(event_ts, 'yyyy-MM-dd HH:mm:ss') AS event_ts,
          UPPER(TRIM(region)) AS region,
          customer_id
        FROM read_orders
        WHERE amount IS NOT NULL
    # Spillway: route rows that fail casting or other errors to quarantine
    spillway: quarantine_orders

  # -------------------- JUNCTION (⏳ conditional split) --------------------
  - id: split_by_region
    type: Junction
    label: "Split orders by region"
    description: "Route EU and US orders to separate downstream processing."
    config:
      mode: conditional
      branches:
        - id: branch_eu
          label: "EU Orders"
          condition: "region IN ('DE','FR','NL','IT','ES')"
        - id: branch_us
          label: "US Orders"
          condition: "region = 'US'"
        - id: branch_other
          label: "Other Regions"
          condition: "_else_"

  # -------------------- FUNNEL (⏳ union) --------------------
  - id: merge_all_regions
    type: Funnel
    label: "Recombine processed regional streams"
    description: "Union the results of parallel regional processing."
    config:
      mode: union_all
      inputs: [branch_eu, branch_us, branch_other]
      schema_check: strict

  # -------------------- ARCADE (⏳ reusable sub‑pipeline) --------------------
  - id: enrich_customer_data
    type: Arcade
    label: "Enrich orders with customer details"
    description: "Standard customer enrichment (lookup + join)."
    ref: arcades/customer_enrichment.yml    # external Blueprint file
    context_override:
      input_table: clean_orders             # passed to Arcade as ${ctx.input_table}
      lookup_table: ${ctx.tables.customers}

  # -------------------- PROBE (⏳ observability) --------------------
  - id: probe_after_clean
    type: Probe
    label: "Capture quality signals after cleaning"
    attach_to: clean_orders
    config:
      signals:
        - schema_snapshot
        - row_count_estimate:
            method: spark_listener
        - null_rates:
            sample_fraction: 0.05
            columns: [order_id, amount, region, customer_id]
            alert_threshold:
              order_id: 0.0
              amount: 0.01
              region: 0.05

  # -------------------- REGULATOR (⏳ quality gate) --------------------
  - id: quality_gate
    type: Regulator
    label: "Block downstream if null rate too high"
    description: "Prevent writing bad data to production."
    config:
      on_block: skip
      timeout_seconds: 0
      on_timeout: proceed

  # -------------------- EGRESS (✅) --------------------
  - id: write_enriched_orders
    type: Egress
    label: "Write enriched orders to Delta Lake"
    config:
      format: delta
      path: ${ctx.tables.output}
      mode: overwrite
      partition_by: [region]
      options:
        overwriteSchema: true

  # -------------------- EGRESS for error quarantine (✅ Spillway target) --------------------
  - id: quarantine_orders
    type: Egress
    label: "Write error rows to quarantine area"
    config:
      format: parquet
      path: "${ctx.base_path}/quarantine/orders"
      mode: append

# -----------------------------------------------------------------------------
# EDGES (Explicit wiring)
# -----------------------------------------------------------------------------
edges:
  # Main flow
  - from: read_orders
    to: clean_orders
    port: main

  # Spillway from clean_orders → quarantine Egress
  - from: clean_orders
    to: quarantine_orders
    port: spillway
    error_types:
      - CastException
      - NullValueException

  # Junction connections (NO branch field)
  - from: clean_orders
    to: split_by_region
    port: main

  - from: split_by_region
    to: merge_all_regions
    port: main

  # Arcade integration
  - from: clean_orders
    to: enrich_customer_data
    port: main

  - from: enrich_customer_data
    to: write_enriched_orders
    port: main

  # Probe → Regulator signal wiring
  - from: probe_after_clean
    to: quality_gate
    port: signal

  - from: quality_gate
    to: write_enriched_orders
    port: main

# -----------------------------------------------------------------------------
# SPARK CONFIGURATION
# -----------------------------------------------------------------------------
spark_config:
  spark.sql.shuffle.partitions: 200
  spark.sql.adaptive.enabled: true
  spark.sql.adaptive.coalescePartitions.enabled: true

# -----------------------------------------------------------------------------
# RETRY POLICY (✅ parsed, used by Surveyor)
# -----------------------------------------------------------------------------
retry_policy:
  max_attempts: 3
  backoff:
    strategy: exponential
    base_seconds: 30
    max_seconds: 300
    jitter: true
  transient_errors:
    - SparkException: ".*Connection reset.*"
    - Py4JNetworkError
  non_transient_errors:
    - AnalysisException
    - SchemaIncompatibleException
  on_exhaustion: trigger_agent

# -----------------------------------------------------------------------------
# AGENT CONFIG (✅ parsed, used in Phase 7)
# -----------------------------------------------------------------------------
agent:
  approval_mode: auto          # auto | human
  model: claude-sonnet-4-20250514
  max_patches_per_run: 5

# =============================================================================