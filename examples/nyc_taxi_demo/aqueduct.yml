aqueduct_config: "1.0"

deployment:
  engine: spark
  target: local
  # master_url: "spark://10.0.0.39:7077"
  master_url: "local[*]"

spark_config:
  spark.sql.adaptive.enabled: "true"
  spark.sql.shuffle.partitions: "50"   # small for local mode
  spark.sql.session.timeZone: "UTC"

stores:
  observability:
    backend: duckdb
    path: ".aqueduct/signals"
  lineage:
    backend: duckdb
    path: ".aqueduct/lineage"
  depot:
    backend: duckdb
    path: ".aqueduct/depot.duckdb"

webhooks:
  on_failure:
    url: "https://webhook.site/9208374b-ff87-4364-b638-1e7f0f7f2a4a"
    method: POST
    headers:
      Authorization: "Bearer ${OPS_API_TOKEN}"
      X-Source: "aqueduct"
    timeout: 15
    payload:
      pipeline_name: "${PIPELINE_NAME}"
      pipeline_id: "${PIPELINE_ID}"
      run_id: "${RUN_ID}"
      status: "${STATUS}"


agent:
  provider: "openai_compat"
  base_url: "http://10.0.0.39:11434/v1"
  model: "qwen3:32b"

# agent:
#   approval_mode: "human"         # disabled | human | auto
