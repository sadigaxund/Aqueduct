aqueduct_config: "1.0"

deployment:
  engine: spark
  target: standalone
  master_url: "local[*]"

spark_config:
  spark.sql.adaptive.enabled: "true"
  spark.sql.shuffle.partitions: "50"   # small for local mode
  spark.sql.session.timeZone: "UTC"

stores:
  observability:
    backend: duckdb
    path: ".aqueduct/signals"
  lineage:
    backend: duckdb
    path: ".aqueduct/lineage"
  depot:
    backend: duckdb
    path: ".aqueduct/depot.duckdb"

webhooks:
  on_failure:
    url: "https://webhook.site/865a93e1-74d7-4f9c-9e19-ec774c64747e"
    method: POST
    headers:
      Authorization: "Bearer ${OPS_API_TOKEN}"
      X-Source: "aqueduct"
    timeout: 15