aqueduct: "1.0"

id: nyc_taxi_demo
name: "NYC Taxi Demo"

description: |
  Refactored NYC taxi blueprint using Arcades for reusable processing logic.
  Ingests yellow and green taxi trip data, cleans, standardizes, and merges.

context:
  paths:
    yellow_path: "data/yellow/*.parquet"
    green_path: "data/green/*.parquet"
    zones_path: "data/zones/taxi_zone_lookup.csv"
    output_path: "output"
    dead_letter_path: "dead_letter"

modules:

  # ── 1. Process Taxi Data via Arcade ─────────

  - id: yellow_process
    type: Arcade
    label: "Process Yellow Taxi"
    ref: ../arcades/taxi_processor.yml
    context_override:
      taxi_type: yellow
      input_path: "${ctx.paths.yellow_path}"
      dead_letter_path: "${ctx.paths.dead_letter_path}/yellow"
      pickup_col: tpep_pickup_datetime
      dropoff_col: tpep_dropoff_datetime

  - id: green_process
    type: Arcade
    label: "Process Green Taxi"
    ref: ../arcades/taxi_processor.yml
    context_override:
      taxi_type: green
      input_path: "${ctx.paths.green_path}"
      dead_letter_path: "${ctx.paths.dead_letter_path}/green"
      pickup_col: lpep_pickup_datetime
      dropoff_col: lpep_dropoff_datetime

  - id: taxi_zone_lookup
    type: Ingress
    label: "Load Taxi Zone Lookup"
    config:
      format: csv
      path: "${ctx.paths.zones_path}"
      options:
        header: "true"
        inferSchema: "true"

  # ── 2. Merge All Data ──────────────────────────────────────────

  - id: all_taxi_trips
    type: Funnel
    label: "Merge All Taxi Trips"
    config:
      mode: union_all
      inputs: [yellow_process, green_process]

  # ── N. Observe Schema ────────────────────────────────────────────

  - id: yellow_input_probe
    type: Probe
    label: "Observe Yellow Input"
    attach_to: yellow_process__ingress
    config:
      signals:
        - type: schema_snapshot
        - type: row_count_estimate
          method: sample
          fraction: 0.1

  - id: green_input_probe
    type: Probe
    label: "Observe Green Input"
    attach_to: green_process__ingress
    config:
      signals:
        - type: schema_snapshot
        - type: row_count_estimate
          method: sample
          fraction: 0.1

edges:
  - from: yellow_process
    to: all_taxi_trips
  - from: green_process
    to: all_taxi_trips

agent:
  approval_mode: human
  on_pending_patches: warn
  max_patches_per_run: 1
  guardrails:
    allowed_paths:
      - "data/*"
      - "data/zones/*"
      - "data/trips/*"

    forbidden_ops:
      - remove_module
      - replace_retry_policy
