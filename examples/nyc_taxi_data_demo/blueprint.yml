# nyc_taxi_metrics.yml
# NYC Taxi Trip Data Lakehouse — Daily Borough Metrics
# =============================================================================
# This Blueprint demonstrates Phase 8 features:
#   - RetryPolicy with deadline_seconds
#   - Column-level lineage (sqlglot)
#   - LLM self‑healing (approval_mode: auto)
#   - Deliberate column error for demo: `passenger_cnt` (should be `passenger_count`)

aqueduct: "1.0"
id: pipeline.nyc.taxi_borough_metrics
name: "NYC Taxi Daily Borough Metrics"
description: |
  Processes NYC TLC yellow taxi Parquet files, joins with taxi zone lookup,
  and computes daily borough-level aggregations. Includes retry policy,
  lineage tracking, and LLM self‑healing (auto‑approval).

context:
  # Environment & paths — override via CLI or aqueduct.yml
  env: ${AQUEDUCT_ENV:-dev}
  base_path: "s3a://raw-data/nyc-taxi"
  output_path: "s3a://processed/nyc-taxi"
  run_date: "@aq.date.today()"

  # MinIO credentials — read from environment (set via aqueduct.yml or shell)
  minio_access_key: "@aq.secret('MINIO_ACCESS_KEY')"
  minio_secret_key: "@aq.secret('MINIO_SECRET_KEY')"

modules:
  # --------------------------------------------------------------------------
  # 1. INGRESS: Yellow taxi Parquet files (monthly)
  # --------------------------------------------------------------------------
  - id: read_taxi_trips
    type: Ingress
    label: "Read yellow taxi Parquet files"
    description: |
      Reads monthly Parquet files from MinIO. Schema hint enforces types
      and catches upstream schema drift before the SQL Channel runs.
    config:
      format: parquet
      path: ${ctx.base_path}/yellow_tripdata_2026-*.parquet
      schema_hint:
        tpep_pickup_datetime: TIMESTAMP
        tpep_dropoff_datetime: TIMESTAMP
        passenger_count: BIGINT
        trip_distance: DOUBLE
        PULocationID: INT
        DOLocationID: INT
        fare_amount: DOUBLE
        total_amount: DOUBLE
      options:
        mergeSchema: "false"

  # --------------------------------------------------------------------------
  # 2. INGRESS: Taxi zone lookup (static CSV)
  # --------------------------------------------------------------------------
  - id: read_taxi_zones
    type: Ingress
    label: "Read taxi zone lookup CSV"
    description: "Maps LocationID to Borough and Zone names."
    config:
      format: csv
      path: ${ctx.base_path}/taxi_zone_lookup.csv
      options:
        header: "true"
        inferSchema: "true"

  # --------------------------------------------------------------------------
  # 3. SQL CHANNEL: Aggregate borough-level metrics
  # --------------------------------------------------------------------------
  # DELIBERATE ERROR: `passenger_cnt` is a typo — the correct column is
  # `passenger_count`. This triggers an AnalysisException and demonstrates
  # the LLM self‑healing loop.
  - id: aggregate_borough_metrics
    type: Channel
    label: "Compute daily borough-level stats"
    description: |
      Filters valid trips, joins with zone lookup, and aggregates by day,
      pickup borough, and dropoff borough. Includes a deliberate column
      error to trigger self‑healing.
    config:
      op: sql
      query: |
        WITH trip_base AS (
          SELECT
            DATE(tpep_pickup_datetime) AS trip_date,
            PULocationID,
            DOLocationID,
            trip_distance,
            fare_amount,
            total_amount,
            passenger_cnt               -- 🐞 DELIBERATE TYPO (should be passenger_count)
          FROM read_taxi_trips
          WHERE tpep_pickup_datetime >= '2026-01-01'
            AND trip_distance > 0
            AND trip_distance < 100
        )
        SELECT
          tb.trip_date,
          pz.Borough AS pickup_borough,
          dz.Borough AS dropoff_borough,
          COUNT(*) AS num_trips,
          AVG(tb.trip_distance) AS avg_distance,
          AVG(tb.fare_amount) AS avg_fare,
          SUM(tb.total_amount) AS total_revenue,
          PERCENTILE_APPROX(tb.trip_distance, 0.5) AS median_distance
        FROM trip_base tb
        JOIN read_taxi_zones pz ON tb.PULocationID = pz.LocationID
        JOIN read_taxi_zones dz ON tb.DOLocationID = dz.LocationID
        GROUP BY tb.trip_date, pz.Borough, dz.Borough
    spillway: quarantine_errors   # route casting errors (none expected)

  # --------------------------------------------------------------------------
  # 4. PROBE: Capture quality signals (optional)
  # --------------------------------------------------------------------------
  - id: probe_metrics
    type: Probe
    label: "Capture schema & row count"
    attach_to: aggregate_borough_metrics
    config:
      signals:
        - schema_snapshot
        - row_count_estimate:
            method: spark_listener

  # --------------------------------------------------------------------------
  # 5. REGULATOR: Block if row count suspiciously low
  # --------------------------------------------------------------------------
  - id: quality_gate
    type: Regulator
    label: "Block if row count < 1000"
    description: "Prevents writing empty or incomplete aggregations."
    config:
      on_block: skip

  # --------------------------------------------------------------------------
  # 6. EGRESS: Write to Iceberg / Parquet in MinIO
  # --------------------------------------------------------------------------
  - id: write_iceberg
    type: Egress
    label: "Write metrics to Iceberg table"
    description: "Partitioned by trip_date for efficient downstream queries."
    config:
      format: parquet                 # Iceberg not yet implemented; fallback to Parquet
      path: ${ctx.output_path}/borough_metrics/date=${ctx.run_date}
      mode: overwrite
      partition_by: [trip_date]

  # --------------------------------------------------------------------------
  # 7. EGRESS: Quarantine for error rows (Spillway target)
  # --------------------------------------------------------------------------
  - id: quarantine_errors
    type: Egress
    label: "Write error rows to quarantine"
    config:
      format: parquet
      path: ${ctx.base_path}/quarantine/taxi_errors
      mode: append

# ----------------------------------------------------------------------------
# EDGES
# ----------------------------------------------------------------------------
edges:
  - from: read_taxi_trips
    to: aggregate_borough_metrics
  - from: read_taxi_zones
    to: aggregate_borough_metrics

  - from: aggregate_borough_metrics
    to: probe_metrics
    port: main

  - from: aggregate_borough_metrics
    to: quarantine_errors
    port: spillway

  - from: probe_metrics
    to: quality_gate
    port: signal

  - from: quality_gate
    to: write_iceberg
    port: main

# ----------------------------------------------------------------------------
# SPARK CONFIGURATION (merged with aqueduct.yml)
# ----------------------------------------------------------------------------
spark_config:
  spark.sql.adaptive.enabled: "true"
  spark.sql.adaptive.coalescePartitions.enabled: "true"
  spark.sql.shuffle.partitions: "100"          # reasonable for 1‑2 GB data

# ----------------------------------------------------------------------------
# RETRY POLICY (Phase 8)
# ----------------------------------------------------------------------------
retry_policy:
  max_attempts: 3
  deadline_seconds: 3600                       # 1 hour hard stop
  backoff:
    strategy: exponential
    base_seconds: 30
    max_seconds: 300
    jitter: true
  transient_errors:
    - SparkException: ".*Connection reset.*"
    - SparkException: ".*S3A.*timeout.*"
    - S3AException
  non_transient_errors:
    - AnalysisException
    - SchemaIncompatibleException
  on_exhaustion: trigger_agent

# ----------------------------------------------------------------------------
# AGENT CONFIG (LLM self‑healing — Phase 8)
# ----------------------------------------------------------------------------
agent:
  approval_mode: auto                          # Apply patches immediately
  on_pending_patches: warn                     # Warn if pending patches exist
  model: gemma3:12b
  provider: ollama
  base_url: http://10.0.0.39:11434