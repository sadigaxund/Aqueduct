# =============================================================================
# AQUEDUCT — COMPREHENSIVE REFERENCE BLUEPRINT
# =============================================================================
# This file is documentation, not a runnable pipeline.
# Every module type, every config key, every edge variant, every policy option
# is shown here so you can copy-paste directly into real Blueprints.
#
# Sections:
#   1.  Top-level fields
#   2.  Context & context_profiles
#   3.  UDF registry
#   4.  Modules
#       4a. Ingress         — all format variants
#       4b. Channel         — sql, deduplicate, filter, join, cache
#       4c. Assert          — all rule types, all on_fail actions
#       4d. Junction        — conditional, broadcast, partition
#       4e. Funnel          — union_all, union, coalesce
#       4f. Probe           — all signal types
#       4g. Regulator       — all on_block actions
#       4h. Egress          — parquet, delta, depot, collect
#       4i. Arcade          — sub-pipeline reference
#   5.  Edges              — main, spillway, signal, branch ports
#   6.  Spark config
#   7.  Retry policy
#   8.  Agent config (LLM self-healing)
# =============================================================================

# ---------------------------------------------------------------------------
# 1. TOP-LEVEL FIELDS
# ---------------------------------------------------------------------------
aqueduct: "1.0"
id: reference.comprehensive.pipeline
name: "Aqueduct Comprehensive Reference"
description: |
  Reference Blueprint — not intended to run.
  Demonstrates every module type, config key, and edge variant.

# ---------------------------------------------------------------------------
# 2. CONTEXT & CONTEXT_PROFILES
# ---------------------------------------------------------------------------
# Tier 0 (${ctx.*}) — resolved at parse time before Manifest is written.
# Tier 1 (@aq.*)    — resolved on driver before any Spark job starts.
context:
  env: ${AQUEDUCT_ENV:-dev}           # reads shell env var, defaults to "dev"

  # nested namespaces with dot notation
  tables:
    orders_raw:     "s3a://raw/${ctx.env}/orders/"
    customers_raw:  "s3a://raw/${ctx.env}/customers/"
    orders_clean:   "s3a://processed/${ctx.env}/orders/"
    quarantine:     "s3a://quarantine/${ctx.env}/orders/"
    depot_key:      "watermarks.orders"

  params:
    dedup_key:      "order_id"
    min_rows:       10000
    max_null_rate:  0.02
    alert_webhook:  ${ALERT_WEBHOOK_URL:-http://localhost:9000/hooks/alert}

  # Tier 1 runtime functions — resolved just before Spark jobs start
  run_date:   "@aq.date.today()"                       # e.g. "2026-04-23"
  yesterday:  "@aq.date.yesterday()"
  week_start: "@aq.date.offset(base=@aq.date.today(), days=-7)"
  run_ts:     "@aq.runtime.timestamp()"
  run_id_val: "@aq.runtime.run_id()"
  prev_run:   "@aq.runtime.prev_run_id()"

  # Depot read (cross-run watermark)
  last_orders_ts: "@aq.depot.get('watermarks.orders', '1970-01-01T00:00:00Z')"

  # Secret fetch (AWS Secrets Manager / env fallback)
  db_password: "@aq.secret('prod/orders/db_password')"

# Profile overrides for environment promotion
# Usage: aqueduct run blueprint.yml --profile prod
context_profiles:
  dev:
    params.min_rows: 100
    tables.orders_raw: "s3a://dev/orders/"
  staging:
    params.min_rows: 1000
    tables.orders_raw: "s3a://staging/orders/"
  prod:
    params.min_rows: 50000
    tables.orders_raw: "s3a://prod/orders/"

# ---------------------------------------------------------------------------
# 3. SQL MACROS (compile-time, resolved before Spark runs)
# ---------------------------------------------------------------------------
# Reusable SQL fragments. Expanded at compile time — Manifest always has plain SQL.
# No loops, no conditionals. Two forms: simple ({{ macros.name }}) and
# parameterized ({{ macros.name(key=value) }}).
macros:
  active_filter: "status = 'active' AND deleted_at IS NULL"
  date_trunc: "DATE_TRUNC('{{ period }}', {{ column }})"
  null_safe_join: "{{ left }} IS NOT DISTINCT FROM {{ right }}"

# ---------------------------------------------------------------------------
# 4. UDF REGISTRY
# ---------------------------------------------------------------------------
# UDFs are Tier 2 — execute during Spark Channel ops, not at parse/compile time.
udf_registry:
  - id: clean_phone
    label: "Normalise phone to E.164 format"
    lang: python
    path: udfs/clean_phone.py
    entry: clean_phone_fn             # function name within the module
    return_type: STRING
    deterministic: true

  - id: haversine_km
    label: "Great-circle distance in km"
    lang: scala
    jar: udfs/geo-udfs-1.0.jar
    class: com.example.udfs.Haversine
    return_type: DOUBLE
    deterministic: true

  - id: parse_currency
    label: "Parse currency string to DECIMAL"
    lang: python
    path: udfs/finance.py
    entry: parse_currency_fn
    return_type: "DECIMAL(18,4)"
    deterministic: true

# ---------------------------------------------------------------------------
# 4. MODULES
# ---------------------------------------------------------------------------
modules:

  # ─────────────────────────────────────────────────────────────────────────
  # 4a. INGRESS — read data from external sources
  # ─────────────────────────────────────────────────────────────────────────

  # Parquet from object storage
  - id: raw_orders
    type: Ingress
    label: "Raw Orders (S3 Parquet)"
    description: "Landing zone parquet for daily order events."
    tags: [ingress, orders, raw]
    config:
      format: parquet
      path: "${ctx.tables.orders_raw}"
      schema_hint:                    # optional — enforced at read time
        order_id:   STRING
        customer_id: STRING
        amount:     "DECIMAL(18,2)"
        order_ts:   TIMESTAMP
        region:     STRING
        status:     STRING
      options:
        mergeSchema: "true"           # all options passed verbatim to DataFrameReader
        basePath: "${ctx.tables.orders_raw}"

  # CSV with header and inferred schema
  - id: raw_customers
    type: Ingress
    label: "Raw Customers (CSV)"
    config:
      format: csv
      path: "${ctx.tables.customers_raw}"
      options:
        header: "true"
        inferSchema: "true"
        sep: ","

  # Delta Lake — incremental read via watermark
  - id: orders_delta_incremental
    type: Ingress
    label: "Incremental Orders from Delta (watermark)"
    config:
      format: delta
      path: "s3a://lake/orders/"
      options:
        versionAsOf: "10"             # or timestampAsOf for time-travel

  # JDBC source
  - id: dim_products
    type: Ingress
    label: "Product dimension (PostgreSQL JDBC)"
    config:
      format: jdbc
      path: "jdbc:postgresql://db.example.com:5432/warehouse"
      options:
        dbtable: "public.products"
        user: "etl_user"
        password: "${ctx.db_password}"
        numPartitions: "4"
        partitionColumn: "product_id"
        lowerBound: "1"
        upperBound: "1000000"
        fetchsize: "10000"

  # JSON
  - id: raw_events
    type: Ingress
    label: "Click events (JSON)"
    config:
      format: json
      path: "s3a://events/${ctx.run_date}/"
      options:
        multiLine: "false"

  # ─────────────────────────────────────────────────────────────────────────
  # 4b. CHANNEL — transformations (all lazy — no Spark actions)
  # ─────────────────────────────────────────────────────────────────────────

  # op: sql — upstream IDs are auto-registered as temp views
  - id: clean_orders
    type: Channel
    label: "Clean & cast raw orders"
    config:
      op: sql
      udfs: [clean_phone, parse_currency]   # registered before query runs
      query: |
        SELECT
          o.order_id,
          o.customer_id,
          CAST(o.amount    AS DECIMAL(18,4))  AS amount,
          CAST(o.order_ts  AS TIMESTAMP)      AS order_ts,
          TRIM(UPPER(o.region))               AS region,
          o.status,
          clean_phone(c.phone)                AS phone_e164,
          c.email
        FROM raw_orders    o
        LEFT JOIN raw_customers c ON o.customer_id = c.customer_id
        WHERE o.amount    IS NOT NULL
          AND o.order_ts  > CAST('${ctx.last_orders_ts}' AS TIMESTAMP)

  # op: deduplicate — keep last event per key
  - id: dedup_orders
    type: Channel
    label: "Deduplicate orders by order_id, keep latest"
    config:
      op: deduplicate
      key: "${ctx.params.dedup_key}"       # single key or list
      order_by: "order_ts DESC"

  # op: filter
  - id: active_orders
    type: Channel
    label: "Keep only ACTIVE and PENDING orders"
    config:
      op: filter
      condition: "status IN ('ACTIVE', 'PENDING')"

  # op: cache — persists lazy plan to avoid recomputation in fan-out
  - id: orders_cached
    type: Channel
    label: "Cache enriched orders before fan-out"
    config:
      op: cache
      storage_level: MEMORY_AND_DISK     # MEMORY_ONLY | MEMORY_AND_DISK | DISK_ONLY

  # op: sql with Tier 1 runtime value injected
  - id: tag_run_metadata
    type: Channel
    label: "Add run metadata columns"
    config:
      op: sql
      query: |
        SELECT
          *,
          '${ctx.run_date}'    AS aq_run_date,
          '${ctx.run_id_val}'  AS aq_run_id,
          CURRENT_TIMESTAMP()  AS processed_at
        FROM orders_cached

  # op: sql with UDF and haversine distance
  - id: enrich_geo
    type: Channel
    label: "Add geo distance from DC warehouse"
    config:
      op: sql
      udfs: [haversine_km]
      query: |
        SELECT
          *,
          haversine_km(lat, lon, 38.8977, 77.0365) AS km_from_dc
        FROM tag_run_metadata

  # op: join — higher-level join sugar (translates to SQL at compile time)
  - id: enrich_with_customers
    type: Channel
    label: "Join orders with customer dimension"
    config:
      op: join
      left: dedup_orders         # upstream module ID (registered as temp view)
      right: raw_customers       # upstream module ID
      join_type: left            # inner | left | right | full | semi | anti | cross
      condition: "dedup_orders.customer_id = raw_customers.customer_id"
      broadcast_side: right      # optional BROADCAST hint — use for the smaller side

  # op: join with macro — use a macro for the condition expression
  - id: filtered_join
    type: Channel
    label: "Join with macro-based filter applied"
    config:
      op: sql
      query: |
        SELECT o.*, c.email
        FROM dedup_orders o
        LEFT JOIN raw_customers c ON o.customer_id = c.customer_id
        WHERE {{ macros.active_filter }}
          AND {{ macros.date_trunc(period='day', column=o.order_ts) }} >= '${ctx.start_date}'

  # ─────────────────────────────────────────────────────────────────────────
  # 4c. ASSERT — inline data quality gates
  #     Sits on main-port edges. Passes good rows downstream.
  #     Failing rows → spillway (quarantine) or abort/warn.
  # ─────────────────────────────────────────────────────────────────────────

  - id: orders_quality_gate
    type: Assert
    label: "Data quality gate before regional split"
    config:
      rules:

        # schema_match — zero Spark action; raises AssertError on mismatch
        - type: schema_match
          expected:
            order_id:   STRING
            amount:     "DECIMAL(18,4)"
            order_ts:   TIMESTAMP
            region:     STRING
          on_fail: abort

        # min_rows — batched into shared df.agg(); abort if below threshold
        - type: min_rows
          min: "${ctx.params.min_rows}"
          on_fail: abort

        # null_rate — one shared df.sample().agg() for all null_rate rules
        - type: null_rate
          column: order_id
          fraction: 0.1                 # sample 10% for null check
          max: 0.0                      # zero nulls tolerated
          on_fail: abort

        - type: null_rate
          column: amount
          fraction: 0.1
          max: "${ctx.params.max_null_rate}"
          on_fail: warn                 # log warning, continue

        # freshness — max(order_ts) in batched agg()
        - type: freshness
          column: order_ts
          max_age_hours: 26             # fail if latest record is older than 26h
          on_fail:
            action: webhook
            url: "${ctx.params.alert_webhook}"
          # pipeline continues; webhook fires async

        # sql — arbitrary aggregate expression in batched agg()
        - type: sql
          expr: "SUM(amount) > 0"       # total revenue must be positive
          on_fail:
            action: webhook
            url: "${ctx.params.alert_webhook}"

        # sql_row — lazy filter; failing rows routed to spillway
        - type: sql_row
          expr: "amount > 0 AND order_id IS NOT NULL AND region IS NOT NULL"
          on_fail: quarantine           # rows failing expr go to spillway port

        # custom — Python callable; fn(df) -> {passed, message, quarantine_df}
        - type: custom
          fn: "my_project.quality.validate_orders"
          on_fail: quarantine

        # trigger_agent — fire LLM self-healing loop on failure
        - type: min_rows
          min: 1
          on_fail: trigger_agent       # AssertError(trigger_agent=True) → LLM loop

  # ─────────────────────────────────────────────────────────────────────────
  # 4d. JUNCTION — fan-out (split one DataFrame into multiple branches)
  # ─────────────────────────────────────────────────────────────────────────

  # mode: conditional — each branch gets a filtered subset
  - id: split_by_region
    type: Junction
    label: "Route orders by region"
    config:
      mode: conditional
      branches:
        - id: us
          label: "North America"
          condition: "region IN ('US', 'CA', 'MX')"
        - id: eu
          label: "Europe"
          condition: "region IN ('DE', 'FR', 'GB', 'NL', 'IT', 'ES')"
        - id: apac
          label: "Asia-Pacific"
          condition: "region IN ('JP', 'KR', 'AU', 'SG', 'IN')"
        - id: other
          label: "All other regions"
          condition: "_else_"           # catches unmatched rows

  # mode: broadcast — same DataFrame to all branches (parallel independent ops)
  - id: broadcast_for_reports
    type: Junction
    label: "Send same data to multiple report paths"
    config:
      mode: broadcast
      branches:
        - id: for_finance
        - id: for_ops
        - id: for_ml

  # mode: partition — split by key column value
  - id: partition_by_status
    type: Junction
    label: "Partition by order status"
    config:
      mode: partition
      key: status
      branches:
        - id: active
          value: ACTIVE
        - id: pending
          value: PENDING
        - id: cancelled
          value: CANCELLED

  # ─────────────────────────────────────────────────────────────────────────
  # 4e. FUNNEL — fan-in (merge multiple DataFrames into one)
  # ─────────────────────────────────────────────────────────────────────────

  # mode: union_all — UNION ALL (preserves duplicates, zero shuffle)
  - id: merge_regional
    type: Funnel
    label: "Merge all regional branches"
    config:
      mode: union_all
      inputs:
        - split_by_region.us
        - split_by_region.eu
        - split_by_region.apac
        - split_by_region.other
      schema_check: strict             # strict | permissive

  # mode: union — UNION DISTINCT (deduplicates, requires shuffle)
  - id: merge_dedup
    type: Funnel
    label: "Merge and deduplicate"
    config:
      mode: union
      inputs:
        - partition_by_status.active
        - partition_by_status.pending
      schema_check: strict

  # mode: coalesce — fill nulls from fallback source (inputs must be aligned)
  - id: coalesce_with_fallback
    type: Funnel
    label: "Fill nulls from fallback dataset"
    config:
      mode: coalesce
      inputs:
        - raw_orders
        - orders_delta_incremental    # fallback for missing rows

  # ─────────────────────────────────────────────────────────────────────────
  # 4f. PROBE — observability tap (no Spark actions on critical path)
  # ─────────────────────────────────────────────────────────────────────────

  - id: probe_after_clean
    type: Probe
    label: "Quality probe after cleaning"
    attach_to: clean_orders            # taps this module's output edge
    config:
      signals:
        # schema_snapshot — free, metadata only
        - type: schema_snapshot

        # row_count_estimate from SparkListener — zero cost
        - type: row_count_estimate
          method: spark_listener

        # row_count_estimate via sample (low cost, approximate)
        - type: row_count_estimate
          method: sample
          fraction: 0.01

        # null_rates — one Spark action on sampled data
        - type: null_rates
          columns: [order_id, amount, region, order_ts]
          fraction: 0.05
          alert_threshold:
            order_id:  0.0             # alert if any null
            amount:    0.02            # alert if > 2% null
            region:    0.05

        # sample_rows — DataFrame.take(N), short-circuit scan
        - type: sample_rows
          n: 10

        # value_distribution — min/max/mean/stddev + percentiles on sample
        - type: value_distribution
          columns: [amount]              # omit → all numeric columns
          fraction: 0.1
          percentiles: [0.25, 0.5, 0.75]

        # distinct_count — approx_count_distinct per column on sample
        - type: distinct_count
          columns: [region, status]      # omit → all columns
          fraction: 0.1

        # data_freshness — max(timestamp column)
        - type: data_freshness
          column: order_ts               # required; timestamp or date column
          # allow_sample: true           # uncomment to use fraction below
          # fraction: 0.1

        # partition_stats — df.rdd.getNumPartitions() — zero Spark action
        - type: partition_stats

  # ─────────────────────────────────────────────────────────────────────────
  # 4g. REGULATOR — trigger gate (passive until signal port is wired)
  # ─────────────────────────────────────────────────────────────────────────

  # Signal = True  → gate opens, downstream executes normally
  # Signal = False → on_block action fires
  # Not wired      → compiled away entirely (zero overhead)

  - id: quality_gate
    type: Regulator
    label: "Block downstream if data quality signal is False"
    config:
      on_block: abort                  # skip | abort | trigger_agent
      timeout_seconds: 120             # 0 = no timeout
      on_timeout: proceed              # proceed | skip | abort

  - id: freshness_gate
    type: Regulator
    label: "Block if freshness check fails"
    config:
      on_block: trigger_agent         # fire LLM loop with gate context
      timeout_seconds: 0
      on_timeout: proceed

  # ─────────────────────────────────────────────────────────────────────────
  # 4h. EGRESS — write data to sinks (only module type that triggers actions)
  # ─────────────────────────────────────────────────────────────────────────

  # Parquet — overwrite, date-partitioned
  - id: write_orders_parquet
    type: Egress
    label: "Write clean orders to S3 Parquet"
    checkpoint: true                   # write checkpoint after success
    config:
      format: parquet
      path: "${ctx.tables.orders_clean}date=${ctx.run_date}/"
      mode: overwrite                  # overwrite | append | merge | error | ignore
      partition_by: [region]
      options:
        compression: snappy

  # Delta Lake — merge (upsert) with merge_key
  - id: write_orders_delta
    type: Egress
    label: "Upsert to Delta Lake orders table"
    config:
      format: delta
      path: "s3a://lake/orders_clean/"
      mode: merge
      merge_key: [order_id]            # MERGE INTO key columns
      partition_by: [region, aq_run_date]
      options:
        mergeSchema: "true"

  # Delta — register as external Hive/Glue table after write
  - id: write_and_register
    type: Egress
    label: "Write Delta and register as external table"
    config:
      format: delta
      path: "s3a://lake/orders_registered/"
      mode: overwrite
      register_as_table: orders_registered    # CREATE TABLE IF NOT EXISTS in catalog

  # Depot KV write — update watermark after successful run
  - id: update_watermark
    type: Egress
    label: "Update orders watermark"
    config:
      format: depot
      key: "watermarks.orders"
      value: "@aq.runtime.timestamp()"
      access: readwrite                # readwrite | readonly | writeonly

  # Quarantine sink — receives spillway rows from Assert
  - id: write_quarantine
    type: Egress
    label: "Write quarantine rows to dead-letter store"
    config:
      format: parquet
      path: "${ctx.tables.quarantine}date=${ctx.run_date}/"
      mode: append                     # append for quarantine (accumulate)
      partition_by: [region]

  # collect — small aggregation result returned to driver
  - id: collect_summary
    type: Egress
    label: "Collect daily summary stats to RunRecord"
    config:
      format: collect                  # not for large datasets
      collect: true

  # JDBC sink
  - id: write_to_postgres
    type: Egress
    label: "Write aggregated results to PostgreSQL"
    config:
      format: jdbc
      path: "jdbc:postgresql://db.example.com:5432/warehouse"
      mode: append
      options:
        dbtable: "public.daily_orders_agg"
        user: "etl_user"
        password: "${ctx.db_password}"
        batchsize: "5000"

  # ─────────────────────────────────────────────────────────────────────────
  # 4i. ARCADE — encapsulated sub-pipeline (expanded at compile time)
  # ─────────────────────────────────────────────────────────────────────────

  - id: enrich_with_customer_arcade
    type: Arcade
    label: "Standard customer enrichment (Arcade)"
    ref: arcades/customer_enrichment.yml   # path to sub-Blueprint
    context_override:                       # context passed into Arcade
      input_table: dedup_orders
      lookup_table: "${ctx.tables.customers_raw}"
      join_key: customer_id
    spillway: write_quarantine             # Arcade-level spillway target

# ---------------------------------------------------------------------------
# 5. EDGES
# ---------------------------------------------------------------------------
# Ports:
#   main     — DataFrame data flow (default)
#   signal   — boolean/error signal to Regulator
#   spillway — error/quarantine rows from Assert or Channel
#   <branch> — Junction branch IDs (us, eu, other, etc.)
edges:

  # Ingress → Channel (multi-input: both registered as temp views in SQL)
  - from: raw_orders
    to: clean_orders
    port: main
  - from: raw_customers
    to: clean_orders
    port: main

  # Channel chain
  - from: clean_orders
    to: dedup_orders
  - from: dedup_orders
    to: active_orders
  - from: active_orders
    to: orders_cached
  - from: orders_cached
    to: tag_run_metadata
  - from: tag_run_metadata
    to: enrich_geo

  # Probe tap — observes clean_orders output (no DataFrame on this edge)
  # attach_to in Probe config wires this implicitly; edge is informational

  # Probe → Regulator (signal wire — carries boolean, not DataFrame)
  - from: probe_after_clean
    to: quality_gate
    port: signal

  # Regulator → Assert (data flows through gate)
  - from: quality_gate
    to: orders_quality_gate
    port: main

  # Assert main port → Junction
  - from: orders_quality_gate
    to: split_by_region
    port: main

  # Assert spillway → quarantine Egress (row-level failures)
  - from: orders_quality_gate
    to: write_quarantine
    port: spillway

  # Junction → Funnel via branch ports
  - from: split_by_region
    to: merge_regional
    port: us
  - from: split_by_region
    to: merge_regional
    port: eu
  - from: split_by_region
    to: merge_regional
    port: apac
  - from: split_by_region
    to: merge_regional
    port: other

  # Funnel → Egress chain
  - from: merge_regional
    to: write_orders_parquet
    port: main
  - from: merge_regional
    to: write_orders_delta
    port: main

  # Channel spillway → quarantine (row-level cast errors routed here)
  - from: clean_orders
    to: write_quarantine
    port: spillway
    error_types:                       # optional: only route these error types
      - CastException
      - NullValueException

  # Arcade wired like a regular module
  - from: dedup_orders
    to: enrich_with_customer_arcade
    port: main
  - from: enrich_with_customer_arcade
    to: write_and_register
    port: main

  # Watermark update wired after successful write
  - from: write_orders_delta
    to: update_watermark
    port: main

# ---------------------------------------------------------------------------
# 6. SPARK CONFIG
# ---------------------------------------------------------------------------
# Merged with Aqueduct engine defaults. Blueprint values take precedence.
spark_config:
  spark.sql.shuffle.partitions: "200"
  spark.sql.adaptive.enabled: "true"
  spark.sql.adaptive.coalescePartitions.enabled: "true"
  spark.sql.adaptive.skewJoin.enabled: "true"
  spark.sql.extensions: "io.delta.sql.DeltaSparkSessionExtension"
  spark.sql.catalog.spark_catalog: "org.apache.spark.sql.delta.catalog.DeltaCatalog"

  # S3 access
  spark.hadoop.fs.s3a.access.key: "@aq.secret('aws/access_key')"
  spark.hadoop.fs.s3a.secret.key: "@aq.secret('aws/secret_key')"
  spark.hadoop.fs.s3a.endpoint: "s3.amazonaws.com"

# ---------------------------------------------------------------------------
# 7. RETRY POLICY (pipeline-level default)
# ---------------------------------------------------------------------------
# Individual modules can override with on_failure: field.
retry_policy:
  max_attempts: 3
  backoff:
    strategy: exponential              # linear | exponential | fixed
    base_seconds: 30
    max_seconds: 600
    jitter: true                       # ±20% random jitter
  transient_errors:                    # retried without LLM involvement
    - "SparkException: .*Connection reset.*"
    - "SparkException: .*Task not serializable.*"
    - "Py4JNetworkError"
  non_transient_errors:                # skip retry, go straight to LLM loop
    - "AnalysisException"
    - "SchemaIncompatibleException"
    - "ParseException"
  on_exhaustion: trigger_agent        # trigger_agent | abort | alert_only
  deadline_seconds: 3600              # total budget across all attempts

# Per-module override example — shown inline on module:
# - id: flaky_s3_read
#   type: Ingress
#   on_failure:
#     max_attempts: 5
#     backoff:
#       strategy: exponential
#       base_seconds: 60
#     on_exhaustion: abort

# ---------------------------------------------------------------------------
# 8. AGENT CONFIG (LLM self-healing)
# ---------------------------------------------------------------------------
agent:
  # disabled    — LLM never fires (safe default)
  # human       — patch written to patches/pending/, you review and apply manually
  # auto        — patch applied in-memory, pipeline re-run to validate;
  #               written to Blueprint permanently only if re-run succeeds
  # aggressive  — patch written to Blueprint immediately, pipeline re-runs;
  #               loops up to max_patches_per_run; ⚠ permanent changes, no gate
  approval_mode: disabled

  on_pending_patches: warn            # ignore | warn | block
  max_patches_per_run: 3

  # ── Anthropic (default; connection from aqueduct.yml agent: block) ────────
  provider: anthropic                 # anthropic | openai_compat
  model: "claude-sonnet-4-6"
  # ANTHROPIC_API_KEY env var required

  # ── Ollama / vLLM / LM Studio (override aqueduct.yml defaults) ───────────
  # provider: openai_compat
  # base_url: "http://10.0.0.39:11434/v1"   # /v1 suffix required
  # model: "deepseek-r1:14b"
  # ollama_options:
  #   num_thread: 16
  #   num_gpu: 0                             # 0 = CPU only; 99 = all on GPU
  #   mlock: true
  #   num_batch: 1024
  #   num_predict: -1

  # ── LLM Guardrails ────────────────────────────────────────────────────────
  # Patches violating these rules are staged for human review instead of applied.
  #
  # allowed_paths: fnmatch whitelist for config.path values the LLM may touch.
  #   Empty (default) = unrestricted. Paths not matching → human review.
  allowed_paths:
    - "s3a://raw/${ctx.env}/*"
    - "s3a://processed/${ctx.env}/*"
    - "s3a://quarantine/${ctx.env}/*"
  #
  # forbidden_ops: PatchSpec operation names the LLM is never allowed to use.
  #   Empty (default) = all ops permitted. Matching op → human review.
  forbidden_ops:
    - remove_module              # never delete modules autonomously
    - replace_retry_policy       # retry policy is managed by humans only
