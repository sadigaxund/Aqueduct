aqueduct_config: "1.0"

deployment:
  engine: spark
  target: local
  master_url: "local[*]"

spark_config:
  spark.sql.shuffle.partitions: "1"
  spark.driver.bindAddress: "127.0.0.1"

# Standard local storage paths
stores:
  obs:
    path: ".aqueduct/obs.db"
  lineage:
    path: ".aqueduct/lineage.db"
  depot:
    path: ".aqueduct/depot.db"
