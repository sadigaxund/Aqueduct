aqueduct: "1.0"

id: healing_demo
name: Healing Process Demo

# Self-healing policy
agent:
  approval_mode: auto  # Auto-apply patches if they pass validation
  max_patches_per_run: 1
  llm_timeout: 1200.0              # 10 min read timeout for local/slow models (Ollama)
  llm_max_reprompts: 3
  on_heal_failure: "stage"

context:
  input_file: "data_dir/users.csv"
  output_dir: "data_dir/output"

modules:
  - id: raw_users
    label: "Raw Users Input"
    type: Ingress
    description: "Intentionally misconfigured to read CSV as Parquet"
    config:
      format: parquet
      path: "${ctx.input_file}"

  - id: select_users
    label: "Select Users"
    type: Channel
    config:
      op: sql
      query: "SELECT id, name FROM raw_users"

  - id: save_users
    label: "Save Users"
    type: Egress
    config:
      format: parquet
      path: "${ctx.output_dir}"
      mode: overwrite

edges:
  - from: raw_users
    to: select_users
  - from: select_users
    to: save_users
