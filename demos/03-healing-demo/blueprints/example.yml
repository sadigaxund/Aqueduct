id: healing_demo
name: Healing Process Demo

# Self-healing policy
agent:
  approval_mode: auto  # Auto-apply patches if they pass validation
  max_patches_per_run: 1

context:
  input_file: "data/users.csv"
  output_dir: "data/output"

modules:
  - id: raw_users
    type: Ingress
    description: "Intentionally misconfigured to read CSV as Parquet"
    config:
      format: parquet  # THIS IS THE BUG
      path: "${ctx.input_file}"

  - id: select_users
    type: Channel
    config:
      op: sql
      query: "SELECT id, name FROM raw_users"

  - id: save_users
    type: Egress
    config:
      format: parquet
      path: "${ctx.output_dir}"
      mode: overwrite

edges:
  - from: raw_users
    to: select_users
  - from: select_users
    to: save_users
